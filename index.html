    const BUILD_PREREQ = {
      hafen:["markt","mine"],

      burg:["markt","farm"],
      uni:["markt","tempel"]
    };

    // Mehrfach-Bauen: Kostenmultiplikator pro zusätzlichem Gebäude in dieser Runde
    const BUILD_MULTI_MULT = [1, 1.6, 2.3]; // 1. Bau normal, 2. Bau teurer, 3. Bau am teuersten
    const MAX_BUILDS_PER_ROUND = 3;
    function scaleCost(cost, mult) {
      const out = {};
      for (const [r, v] of Object.entries(cost)) out[r] = Math.ceil(v * mult);
      return out;
    }

    // Finanzamt-Schwelle: ab diesem Gesamtvermögen kann das Finanzamt zuschlagen (vorher 4 — jetzt höher)
    const FINANZAMT_MIN_VERMOEGEN = 8;

    // Räuber — kein VP, aber klaut beim Rundenende
    const RAEUBER_LEVELS = [
      { cost: { Gold: 2 }, steal: 1, desc: "Klaut 1 zufällige Res." },
      { cost: { Gold: 3 }, steal: 2, desc: "Klaut 2 zufällige Res." },
      { cost: { Gold: 4 }, steal: 3, desc: "Klaut 3 zufällige Res." },
    ];

    // Bank trades
    const BANK_TRADES = [
      // Res → Gold
      { give: "Holz",     amt: 3, get: "Gold",     label: "3🪵→1🪙" },
      { give: "Getreide", amt: 4, get: "Gold",     label: "4🌾→1🪙" },
      { give: "Stein",    amt: 4, get: "Gold",     label: "4🪨→1🪙" },
      // Gold → alles (2:1)
      { give: "Gold",     amt: 2, get: "Holz",    label: "2🪙→1🪵" },
      { give: "Gold",     amt: 2, get: "Stein",   label: "2🪙→1🪨" },
      { give: "Gold",     amt: 2, get: "Getreide",label: "2🪙→1🌾" },
    ];
    const BANK_RATES = { Holz: 3, Stein: 4, Getreide: 4 };

    // ── HELPERS ──────────────────────────────────────────────────────────────
    function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function randomResources(idx) {
      const sets = [
        {Holz:2, Stein:1, Getreide:2, Gold:0},
        {Holz:3, Stein:1, Getreide:1, Gold:0},
        {Holz:1, Stein:2, Getreide:2, Gold:0},
        {Holz:2, Stein:2, Getreide:1, Gold:0}
      ];
      return sets[Math.floor(Math.random()*sets.length)];
    }

    function calcIncome(player) {
      const inc = { Holz: 1, Stein: 0, Getreide: 1, Gold: 0 }; // Basis: nur 1 Holz + 1 Getreide
      for (const [bid, lvl] of Object.entries(player.buildings)) {
        const b = BUILDINGS.find(x => x.id === bid);
        if (!b) continue;
        const bd = b.levels[lvl-1];
        for (const [r,v] of Object.entries(bd.income)) inc[r] = (inc[r]||0) + v;
        if (bid === "uni") for (const r of RESOURCES) inc[r] = (inc[r]||0) + lvl;
      }
      return inc;
    }

    function calcVP(player) {
      let t = 0;
      for (const [bid, lvl] of Object.entries(player.buildings)) {
        const b = BUILDINGS.find(x => x.id === bid);
        if (b) t += b.levels[lvl-1].vp;
      }
      return t;
    }

    function canAfford(res, cost) {
      return Object.entries(cost).every(([r,v]) => (res[r]||0) >= v);
    }

    function deduct(res, cost) {
      const r = {...res};
      for (const [k,v] of Object.entries(cost)) r[k] = (r[k]||0) - v;
      return r;
    }

    function applyIncome(player) {
      const inc = calcIncome(player);
      const res = {...player.resources};
      for (const [r,v] of Object.entries(inc)) res[r] = (res[r]||0) + v;
      return {...player, resources: res};
    }

    function incSummary(player) {
      const inc = calcIncome(player);
      return Object.entries(inc).filter(([,v])=>v>0).map(([r,v])=>"+"+v+RES_ICONS[r]).join(" ");
    }

    function generateRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";
      for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random()*chars.length)];
      return code;
    }

    // Spielstand initialisieren — alle Spieler gleichzeitig aktiv
    function initGameState(players) {
      const ps = players.map((p, i) => ({
        ...p,
        resources: randomResources(i),
        buildings: {},
        ready: false,
        pendingBuilds: [], // [{bid, level, cost}] — bis zu 3 pro Runde, je teurer
        pendingRaeuber: null, // { target: idx, level: 1-3 } — geplanter Überfall
      }));
      return {
        players: ps,
        round: 1,
        phase: "playing",
        log: ["Runde 1 beginnt — alle spielen gleichzeitig!"],
        chat: [],
        tradeOffers: [], // Array von offenen Handelsangeboten
        winner: null,
      };
    }

    // ── SUPABASE ─────────────────────────────────────────────────────────────
    function makeSB() {
      const h = {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=representation",
      };
      return {
        async getRoom(id) {
          const r = await fetch(SUPABASE_URL+"/rest/v1/game_rooms?id=eq."+id+"&select=*", {headers:h});
          const d = await r.json(); return d[0]||null;
        },
        async createRoom(id, state) {
          await fetch(SUPABASE_URL+"/rest/v1/game_rooms", {method:"POST",headers:h,body:JSON.stringify({id,state})});
        },
        async updateRoom(id, state) {
          await fetch(SUPABASE_URL+"/rest/v1/game_rooms?id=eq."+id, {method:"PATCH",headers:h,body:JSON.stringify({state})});
        },
        subscribe(id, cb) {
          let lastJson = "";
          const poll = setInterval(async () => {
            try {
              const r = await fetch(SUPABASE_URL+"/rest/v1/game_rooms?id=eq."+id+"&select=state", {headers:h});
              if (!r.ok) return;
              const d = await r.json();
              if (d[0]) {
                const j = JSON.stringify(d[0].state);
                if (j !== lastJson) { lastJson = j; cb(d[0].state); }
              }
            } catch(e) {}
          }, 1500);
          return () => clearInterval(poll);
        },
      };
    }

    // ── COPY BUTTON ──────────────────────────────────────────────────────────
    function CopyButton({text, label}) {
      const [copied, setCopied] = React.useState(false);
      function doCopy() {
        navigator.clipboard.writeText(text).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      }
      return (
        <button onClick={doCopy}
          style={{
            background: copied ? "linear-gradient(135deg,#2a9d8f,#1f7a6f)" : "linear-gradient(135deg,#3a4060,#252a3a)",
            border: "1px solid " + (copied ? "#2a9d8f" : "#555"),
            borderRadius:10, color:"#fff", padding:"9px 16px", fontSize:13, cursor:"pointer",
            fontWeight:700, transition:"all 0.25s cubic-bezier(.4,0,.2,1)",
            transform: copied ? "scale(1.05)" : "scale(1)",
            boxShadow: copied ? "0 0 14px #2a9d8f88" : "0 2px 6px rgba(0,0,0,0.3)",
          }}>
          {copied ? "✅ Kopiert!" : label}
        </button>
      );
    }

    function CopyMenuButton({text, label, onDone}) {
      const [copied, setCopied] = React.useState(false);
      function doCopy() {
        navigator.clipboard.writeText(text).then(() => {
          setCopied(true);
          setTimeout(() => { setCopied(false); if(onDone) onDone(); }, 1500);
        });
      }
      return (
        <button onClick={doCopy}
          style={{width:"100%", background: copied ? "#0e2a1a" : "none", border:"none", borderRadius:8,

            cursor:"pointer", display:"block", transition:"all 0.2s"}}>
          {copied ? "✅ Kopiert!" : label}

    function LevelDots({level}) {
      return (
        <div style={{display:"flex",gap:2}}>
          {[1,2,3].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:i<=level?"#f4a261":"#333"}}/>)}
        </div>
      );
    }

    function VillageMap({player}) {
      const built = BUILDINGS.filter(b => (player.buildings[b.id]||0) > 0);
      if (built.length === 0) {
        return <div style={{color:"#444",fontSize:12,padding:"10px 0",textAlign:"center"}}>Noch keine Gebäude gebaut…</div>;
      }
      return (
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,padding:"6px 0"}}>
          {built.map(b => {
            const lvl = player.buildings[b.id];
            const size = 26 + lvl*8; // größer mit höherer Stufe
            return (
              <div key={b.id} style={{
                background:"linear-gradient(180deg,#2c3349,#1f2433)", borderRadius:10,
                padding:"10px 4px 6px", textAlign:"center", border:"1px solid #3a4060",
                position:"relative",
              }}>
                <div style={{fontSize:size, lineHeight:1, marginBottom:4, filter:"drop-shadow(0 2px 3px rgba(0,0,0,0.4))"}}>{b.icon}</div>
                <div style={{color:"#fff",fontSize:10,fontWeight:700}}>{b.name}</div>
                <LevelDots level={lvl}/>
              </div>
            );
          })}
        </div>
      );
    }

    // ── APP ──────────────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState("home");
      const [myName, setMyName] = useState("");
      const [roomCode, setRoomCode] = useState("");
      const [joinCode, setJoinCode] = useState("");
      const [myIndex, setMyIndex] = useState(null);
      const [isHost, setIsHost] = useState(false);
      const [gs, setGs] = useState(null);
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);
      const [feedback, setFeedback] = useState(""); // success/info feedback

      // Local UI
      const [panel, setPanel] = useState(null);
      const [bankRes, setBankRes] = useState(null);
      const [bankAmt, setBankAmt] = useState(3);
      const [ptTarget, setPtTarget] = useState(null);
      const [ptOffer, setPtOffer] = useState({Holz:0,Stein:0,Getreide:0,Gold:0});
      const [ptWant, setPtWant]   = useState({Holz:0,Stein:0,Getreide:0,Gold:0});
      const [chatMsg, setChatMsg] = useState("");
      const [chatTarget, setChatTarget] = useState(null); // null = an alle, idx = privat an Spieler
      const [menuOpen, setMenuOpen] = useState(false);
      const [raidAlert, setRaidAlert] = useState(null); // {msg, type} shown as popup
      const chatEndRef = useRef(null);

      const sb = useRef(makeSB());
      const codeRef = useRef(null);
      const unsubRef = useRef(null);

      // Session restore
      useEffect(() => {
        const saved = localStorage.getItem("handelswege_session");
        if (saved) {
          try {
            const {code, idx, name} = JSON.parse(saved);
            sb.current.getRoom(code).then(room => {
              if (!room || !room.state) {
                localStorage.removeItem("handelswege_session");
                return;
              }
              const state = room.state;
              // Find player by name in case index shifted (e.g. someone was kicked)
              const foundIdx = state.players ? state.players.findIndex(p => p.name === name) : -1;
              if (foundIdx === -1) {
                localStorage.removeItem("handelswege_session");
                return;
              }
              codeRef.current = code;
              setRoomCode(code);
              setMyIndex(foundIdx);
              setMyName(name);
              setIsHost(foundIdx === 0);
              setGs(state);
              if (state.phase === "lobby") setScreen("lobby");
              else if (state.phase === "playing" || state.phase === "finished") setScreen("game");
              subscribe(code);
              // Update saved index in case it changed
              saveSession(code, foundIdx, name);
            });
          } catch(e) { localStorage.removeItem("handelswege_session"); }
        }
      }, []);

      // Auto-switch lobby→game
      useEffect(() => {
        if (screen === "lobby" && gs && gs.phase === "playing") setScreen("game");
      }, [gs && gs.phase]);

      // Keep myIndex in sync with myName whenever players list changes
      useEffect(() => {
        if (!gs || !gs.players || !myName) return;
        const idx = gs.players.findIndex(p => p.name === myName);
        if (idx === -1) {
          // We got kicked — go back to home
          clearSession();
          setScreen("home"); setGs(null); setMyIndex(null); setIsHost(false); setRoomCode("");
          return;
        }
        if (idx !== myIndex) {
          setMyIndex(idx);
          setIsHost(idx === 0);
          if (codeRef.current) saveSession(codeRef.current, idx, myName);
        }
      }, [gs && gs.players && gs.players.map(p=>p.name).join(",")]);

      // Auto-scroll chat
      useEffect(() => {
        if (chatEndRef.current) chatEndRef.current.scrollIntoView({behavior:"smooth"});
      }, [gs && gs.chat && gs.chat.length]);

      // Show raid alert popup when log contains attack on me
      useEffect(() => {
        if (!gs || !gs.log || !myName) return;
        const latest = gs.log[0];
        if (!latest) return;
        const isMyRaid = latest.includes(myName+"!") && (latest.includes("🗡️") || latest.includes("🏛️"));
        if (isMyRaid) {
          setRaidAlert({msg: latest, type: latest.startsWith("🏛️") ? "bandit" : "raid"});
          setTimeout(() => setRaidAlert(null), 5000);
        }
      }, [gs && gs.log && gs.log[0]]);

      // Show toast when a new round begins
      const lastRoundRef = useRef(null);
      const [roundToast, setRoundToast] = useState(null);
      useEffect(() => {
        if (!gs || gs.phase !== "playing") return;
        if (lastRoundRef.current === null) { lastRoundRef.current = gs.round; return; }
        if (gs.round !== lastRoundRef.current) {
          lastRoundRef.current = gs.round;
          setRoundToast("🔔 Runde "+gs.round+" beginnt!");
          setTimeout(() => setRoundToast(null), 3500);
        }
      }, [gs && gs.round]);

      function subscribe(code) {
        if (unsubRef.current) unsubRef.current();
        unsubRef.current = sb.current.subscribe(code, newState => setGs(newState));
      }

      function saveSession(code, idx, name) { localStorage.setItem("handelswege_session", JSON.stringify({code,idx,name})); }
      function clearSession() { localStorage.removeItem("handelswege_session"); }

      async function push(newGs) {
        setGs(newGs);
        await sb.current.updateRoom(codeRef.current, newGs);
      }

      function addLog(g, msg) { return {...g, log:[msg,...(g.log||[])].slice(0,60)}; }
      function resetTrade() { setPtTarget(null); setPtOffer({Holz:0,Stein:0,Getreide:0,Gold:0}); setPtWant({Holz:0,Stein:0,Getreide:0,Gold:0}); }

      // ── LOBBY ──────────────────────────────────────────────────────────────
      async function createRoom() {
        if (!myName.trim()) { setError("Bitte Namen eingeben"); setFeedback(""); return; }
        if (loading) return; // prevent double-tap
        setLoading(true); setError(""); setFeedback("Raum wird erstellt…");
        try {
          const code = generateRoomCode();
          const lobby = { phase:"lobby", players:[{name:myName.trim(), color:PLAYER_COLORS[0]}], log:[], chat:[], tradeOffers:[], winner:null };
          await sb.current.createRoom(code, lobby);
          codeRef.current = code;
          setRoomCode(code); setMyIndex(0); setIsHost(true); setGs(lobby);
          saveSession(code, 0, myName.trim());
          setFeedback("✅ Raum erstellt! Code: "+code);
          subscribe(code); setScreen("lobby");
        } catch(e) {
          setError("Fehler beim Erstellen. Bitte nochmal versuchen.");
          setFeedback("");
        }
        setLoading(false);
      }

      async function joinRoom() {
        if (!myName.trim()) { setError("Bitte Namen eingeben"); setFeedback(""); return; }
        if (!joinCode.trim()) { setError("Bitte Raum-Code eingeben"); setFeedback(""); return; }
        if (joinCode.trim().length !== 4) { setError("Code muss 4 Zeichen lang sein"); return; }
        setLoading(true); setError(""); setFeedback("Suche Raum "+joinCode.trim().toUpperCase()+"…");
        try {
          const code = joinCode.trim().toUpperCase();
          const room = await sb.current.getRoom(code);
          if (!room) { setError("❌ Raum " + code + " nicht gefunden"); setFeedback(""); setLoading(false); return; }
          if (room.state.phase !== "lobby") { setError("⏳ Spiel in Raum " + code + " läuft bereits"); setFeedback(""); setLoading(false); return; }
          if (room.state.players.length >= 4) { setError("🚫 Raum " + code + " ist voll (4/4)"); setFeedback(""); setLoading(false); return; }
          const idx = room.state.players.length;
          const newPs = [...room.state.players, {name:myName.trim(), color:PLAYER_COLORS[idx]}];
          const newGs = {...room.state, players:newPs};
          codeRef.current = code;
          setRoomCode(code); setMyIndex(idx); setIsHost(false);
          await sb.current.updateRoom(code, newGs);
          saveSession(code, idx, myName.trim());
          setFeedback("✅ Beigetreten! "+room.state.players.map(p=>p.name).join(", ")+" sind schon drin.");
          setGs(newGs); subscribe(code); setScreen("lobby");
        } catch(e) {
          setError("Verbindungsfehler. Bitte nochmal versuchen.");
          setFeedback("");
        }
        setLoading(false);
      }

      async function startGame() {
        if (!gs || gs.players.length < 2) { setError("Mind. 2 Spieler"); return; }
        await push(initGameState(gs.players));
      }

      // ── GAME ACTIONS ───────────────────────────────────────────────────────
      const me = gs && gs.players ? gs.players[myIndex] : null;

      // Plan a build this round (costs resources immediately, shown as "pending"). Bis zu 3 Gebäude pro Runde — jedes weitere kostet mehr.
      async function doBuild(bid) {
        if (!me || me.ready) return;
        const pending = me.pendingBuilds || [];
        if (pending.length >= MAX_BUILDS_PER_ROUND) return;
        const b = BUILDINGS.find(x => x.id === bid);
        const alreadyPlannedForThis = pending.filter(pb => pb.bid === bid).length;
        const cur = (me.buildings[bid] || 0) + alreadyPlannedForThis;
        if (!b || cur >= 3) return;
        const reqs = BUILD_PREREQ[bid];
        if(reqs && !reqs.every(r => (me.buildings[r]||0)>0)) { alert("Voraussetzungen fehlen: "+reqs.join(", ")); return; }
        const bd = b.levels[cur]; // next level
        const mult = BUILD_MULTI_MULT[pending.length] || BUILD_MULTI_MULT[BUILD_MULTI_MULT.length-1];
        const scaledCost = scaleCost(bd.cost, mult);
        if (!canAfford(me.resources, scaledCost)) return;
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {
          ...me,
          resources: deduct(me.resources, scaledCost),
          pendingBuilds: [...pending, {bid, level: cur+1, cost: scaledCost}],
        };
        let g = {...gs, players: newPlayers};
        setPanel(null);
        await push(g);
      }

      async function cancelBuild(idx) {
        if (!me || me.ready) return;
        const pending = me.pendingBuilds || [];
        const pb = pending[idx];
        if (!pb) return;
        // Refund resources
        const refunded = {...me.resources};
        for (const [r,v] of Object.entries(pb.cost)) refunded[r] = (refunded[r]||0) + v;
        const newPending = pending.filter((_,i)=>i!==idx);
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {...me, resources: refunded, pendingBuilds: newPending};
        await push({...gs, players: newPlayers});
      }

      async function doBankTrade(trade) {
        if (!me || me.ready || !trade) return;
        if ((me.resources[trade.give]||0) < trade.amt) return;
        const newPlayers = [...gs.players];
        const newRes = {...me.resources};
        newRes[trade.give] = (newRes[trade.give]||0) - trade.amt;
        newRes[trade.get] = (newRes[trade.get]||0) + 1;
        newPlayers[myIndex] = {...me, resources: newRes};
        let g = addLog({...gs, players:newPlayers},
          me.name+" → Bank: "+trade.amt+RES_ICONS[trade.give]+" → +1"+RES_ICONS[trade.get]);
        setPanel(null);
        await push(g);
      }

      // Send trade offer
      async function sendTradeOffer() {
        if (!me || ptTarget === null) return;
        if (!canAfford(me.resources, ptOffer)) { setError("Nicht genug Ressourcen"); return; }
        if (Object.values(ptOffer).every(v=>v===0) && Object.values(ptWant).every(v=>v===0)) return;
        const offer = {
          id: Date.now(),
          from: myIndex, fromName: me.name, fromColor: me.color,
          to: ptTarget, toName: gs.players[ptTarget].name,
          offer: {...ptOffer}, want: {...ptWant},
        };
        // Reserve the offered resources
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {...me, resources: deduct(me.resources, ptOffer)};
        let g = addLog({...gs, players:newPlayers, tradeOffers:[...(gs.tradeOffers||[]), offer]},
          me.name+" bietet Handel an "+gs.players[ptTarget].name+"…");
        setPanel(null); resetTrade();
        await push(g);
      }

      async function acceptTrade(offer) {
        const them = gs.players[offer.from];
        const myP  = gs.players[myIndex];
        if (!canAfford(myP.resources, offer.want)) { setError("Nicht genug zum Annehmen"); return; }
        const newPlayers = [...gs.players];
        // Give me what I wanted, take what I give
        let myRes = deduct({...myP.resources}, offer.want);
        for (const [r,v] of Object.entries(offer.offer)) myRes[r] = (myRes[r]||0)+v;
        newPlayers[myIndex] = {...myP, resources: myRes};
        // Give them back what they offered + what they wanted
        let thRes = {...them.resources};
        for (const [r,v] of Object.entries(offer.want)) thRes[r] = (thRes[r]||0)+v;
        newPlayers[offer.from] = {...them, resources: thRes};
        // Remove this offer
        const newOffers = (gs.tradeOffers||[]).filter(o=>o.id!==offer.id);
        const os = Object.entries(offer.offer).filter(([,v])=>v>0).map(([r,v])=>v+RES_ICONS[r]).join(" ")||"nichts";
        const ws = Object.entries(offer.want).filter(([,v])=>v>0).map(([r,v])=>v+RES_ICONS[r]).join(" ")||"nichts";
        let g = addLog({...gs, players:newPlayers, tradeOffers:newOffers},
          "✅ "+them.name+" gibt "+os+", "+myP.name+" gibt "+ws);
        await push(g);
      }

      async function declineTrade(offer) {
        // Refund offered resources to sender
        const them = gs.players[offer.from];
        const newPlayers = [...gs.players];
        let thRes = {...them.resources};
        for (const [r,v] of Object.entries(offer.offer)) thRes[r] = (thRes[r]||0)+v;
        newPlayers[offer.from] = {...them, resources: thRes};
        const newOffers = (gs.tradeOffers||[]).filter(o=>o.id!==offer.id);
        let g = addLog({...gs, players:newPlayers, tradeOffers:newOffers},
          "❌ "+gs.players[myIndex].name+" lehnt Angebot von "+offer.fromName+" ab");
        await push(g);
      }

      async function cancelOwnOffer(offer) {
        // Refund my resources
        const newPlayers = [...gs.players];
        let myRes = {...me.resources};
        for (const [r,v] of Object.entries(offer.offer)) myRes[r] = (myRes[r]||0)+v;
        newPlayers[myIndex] = {...me, resources: myRes};
        const newOffers = (gs.tradeOffers||[]).filter(o=>o.id!==offer.id);
        let g = addLog({...gs, players:newPlayers, tradeOffers:newOffers}, me.name+" zieht Angebot zurück");
        await push(g);
      }

      // Plan a raid this round
      async function doRaid(targetIdx, level) {
        if (!me || me.ready || me.pendingRaeuber) return;
        const rd = RAEUBER_LEVELS[level-1];
        if (!canAfford(me.resources, rd.cost)) return;
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {
          ...me,
          resources: deduct(me.resources, rd.cost),
          pendingRaeuber: {target: targetIdx, level},
        };
        let g = addLog({...gs, players: newPlayers},
          me.name+" plant Überfall auf "+gs.players[targetIdx].name+" (Stufe "+level+")");
        setPanel(null);
        await push(g);
      }

      async function cancelRaid() {
        if (!me || me.ready || !me.pendingRaeuber) return;
        const rd = RAEUBER_LEVELS[me.pendingRaeuber.level-1];
        const refunded = {...me.resources};
        for (const [r,v] of Object.entries(rd.cost)) refunded[r] = (refunded[r]||0)+v;
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {...me, resources: refunded, pendingRaeuber: null};
        await push({...gs, players: newPlayers});
      }

      async function deleteRoom() {
        if (!isHost || !gs) return;
        if (!window.confirm("Lobby wirklich löschen? Alle Spieler werden entfernt.")) return;
        // Delete from supabase
        const h = {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        };
        await fetch(SUPABASE_URL+"/rest/v1/game_rooms?id=eq."+codeRef.current, {method:"DELETE", headers:h});
        clearSession();
        setScreen("home"); setGs(null); setMyIndex(null); setIsHost(false); setRoomCode(""); setJoinCode("");
      }

      async function leaveRoom() {
        if (myIndex === null || !gs) return;
        if (isHost) {
          // Host leaving — delete the room (deleteRoom asks for confirmation)
          await deleteRoom();
          return;
        }
        if (!window.confirm("Wirklich den Raum verlassen?")) return;
        // Non-host: remove self from players
        const newPlayers = gs.players.filter((_, i) => i !== myIndex);
        const recolored = newPlayers.map((p, i) => ({...p, color: PLAYER_COLORS[i]}));
        await sb.current.updateRoom(codeRef.current, {...gs, players: recolored});
        clearSession();
        setScreen("home"); setGs(null); setMyIndex(null); setIsHost(false); setRoomCode(""); setJoinCode("");
      }

      async function kickPlayer(idx) {
        if (!isHost || !gs || idx === myIndex) return;
        const newPlayers = gs.players.filter((_, i) => i !== idx);
        // Reassign colors
        const recolored = newPlayers.map((p, i) => ({...p, color: PLAYER_COLORS[i]}));
        let g = addLog({...gs, players: recolored, tradeOffers: (gs.tradeOffers||[]).filter(o => o.from !== idx && o.to !== idx)},
          gs.players[idx].name + " wurde gekickt");
        await push(g);
      }

      async function restartGame() {
        setMenuOpen(false);
        if (!gs) return;
        await push(initGameState(gs.players));
      }

      async function returnToLobby() {
        setMenuOpen(false);
        if (!gs) return;
        const lobby = {
          phase: "lobby",
          players: gs.players.map(p => ({name: p.name, color: p.color})),
          log: [], chat: gs.chat || [], tradeOffers: [], winner: null,
        };
        await push(lobby);
        setScreen("lobby");
      }

      // Mark/unmark ready
      async function markReady() {
        if (!me) return;
        if (me.ready) {
          // Unmark ready
          const newPlayers = [...gs.players];
          newPlayers[myIndex] = {...me, ready: false};
          await push({...gs, players: newPlayers});
          return;
        }
        // Fetch latest state to avoid race conditions
        const fresh = await sb.current.getRoom(codeRef.current);
        const freshGs = fresh ? fresh.state : gs;
        const freshMe = freshGs.players[myIndex];
        if (!freshMe || freshMe.ready) return;
        const newPlayers = [...freshGs.players];
        newPlayers[myIndex] = {...freshMe, ready: true};
        let g = {...freshGs, players: newPlayers};
        g = addLog(g, freshMe.name+" ist bereit ✓");

        // Check if all ready
        const allReady = newPlayers.every(p => p.ready);
        if (allReady) {
          const raidLogs = [];
          // Resolve round: apply pending builds + income
          // First apply builds and income
          let resolved = newPlayers.map(p => {
            let np = {...p, ready: false, buildings: {...(p.buildings||{})}};
            for (const pb of (np.pendingBuilds||[])) {
              np.buildings[pb.bid] = pb.level;
            }
            np.pendingBuilds = [];
            np = applyIncome(np);
            return np;
          });

          // Apply raids — raider gets SOME, rest disappears (chaos tax)
          newPlayers.forEach((p, i) => {
            if (!p.pendingRaeuber) return;
            const {target, level} = p.pendingRaeuber;
            const rd = RAEUBER_LEVELS[level-1];
            const victim = resolved[target];
            const available = RESOURCES.filter(r => (victim.resources[r]||0) > 0);
            if (available.length === 0) {
              raidLogs.push("🗡️ "+p.name+" überfällt "+victim.name+" — aber die Vorräte sind leer!");
              resolved[i] = {...resolved[i], pendingRaeuber: null};
              return;
            }
            // Steal MORE than before (level * 2 items taken from victim)
            let totalTaken = {};
            const takeCount = rd.steal * 2;
            for (let s = 0; s < takeCount; s++) {
              const still = RESOURCES.filter(r => (victim.resources[r]||0) - (totalTaken[r]||0) > 0);
              if (still.length === 0) break;
              const pick = still[Math.floor(Math.random()*still.length)];
              totalTaken[pick] = (totalTaken[pick]||0)+1;
            }
            // Raider only gets ~60% — rest is lost in the chaos
            let raiderGets = {};
            let lost = {};
            for (const [r,v] of Object.entries(totalTaken)) {
              const gets = Math.max(0, Math.floor(v * 0.6));
              const loses = v - gets;
              if (gets > 0) raiderGets[r] = gets;
              if (loses > 0) lost[r] = loses;
            }
            let victimRes = {...victim.resources};
            let raiderRes = {...resolved[i].resources};
            for (const [r,v] of Object.entries(totalTaken)) victimRes[r] = Math.max(0, (victimRes[r]||0)-v);
            for (const [r,v] of Object.entries(raiderGets)) raiderRes[r] = (raiderRes[r]||0)+v;
            resolved[target] = {...victim, resources: victimRes};
            resolved[i] = {...resolved[i], resources: raiderRes, pendingRaeuber: null};
            const takenStr = Object.entries(totalTaken).map(([r,v])=>v+RES_ICONS[r]).join(" ");
            const getsStr  = Object.entries(raiderGets).map(([r,v])=>v+RES_ICONS[r]).join(" ") || "nichts";
            const lostStr  = Object.entries(lost).map(([r,v])=>v+RES_ICONS[r]).join(" ") || "nichts";
            raidLogs.push("🗡️ "+p.name+" überfällt "+victim.name+"! Nimmt "+takenStr+" — bekommt "+getsStr+", "+lostStr+" verschwinden");
          });
          // Clear pending raiders that found no victims
          resolved = resolved.map(p => ({...p, pendingRaeuber: null}));

          // Finanzamt — 25% Chance pro Runde, prüft EINEN zufälligen, wohlhabenden Spieler (höhere Schwelle als früher)
          if (Math.random() < 0.25) {
            // Nur Spieler mit hohem Gesamtvermögen sind Ziele (Schwelle angehoben)
            const eligible = resolved.map((p,i) => ({
              i, total: RESOURCES.reduce((s,r)=>(s+(p.resources[r]||0)),0)
            })).filter(x => x.total >= FINANZAMT_MIN_VERMOEGEN);

            if (eligible.length > 0) {
              // Pick one random victim (weighted by wealth)
              const totalWeight = eligible.reduce((s,x)=>s+x.total, 0);
              let pick = Math.random() * totalWeight;
              let victim = eligible[0];
              for (const e of eligible) {
                pick -= e.total;
                if (pick <= 0) { victim = e; break; }
              }

              const p = resolved[victim.i];
              const newRes = {...p.resources};
              let lost = {};
              for (const r of RESOURCES) {
                if ((newRes[r]||0) <= 0) continue;
                const lose = Math.ceil((newRes[r]||0) * (0.4 + Math.random()*0.3));
                if (lose > 0) { lost[r] = lose; newRes[r] = Math.max(0, newRes[r]-lose); }
              }
              if (Object.keys(lost).length > 0) {
                const lostStr = Object.entries(lost).map(([r,v])=>v+RES_ICONS[r]).join(" ");
                raidLogs.push("🏛️ FINANZAMT prüft "+p.name+"! Verliert "+lostStr+" — Steuern fällig!");
                resolved[victim.i] = {...p, resources: newRes};
              }
            }
          }

          // Check for winner
          let winner = null;
          for (let i = 0; i < resolved.length; i++) {
            if (calcVP(resolved[i]) >= WIN_VP) { winner = i; break; }
          }

          const newRound = gs.round + 1;
          const incLogs = resolved.map(p => p.name+": "+incSummary(p)).join(" | ");
          g = {...g, players: resolved, round: newRound, phase: winner!==null?"finished":"playing", winner};
          g = addLog(g, "🔔 Runde "+gs.round+" abgeschlossen! Einnahmen: "+incLogs);
          for (const rl of raidLogs) g = addLog(g, rl);
          if (winner !== null) g = addLog(g, "🏆 "+resolved[winner].name+" gewinnt mit "+calcVP(resolved[winner])+" VP!");
        }

        await push(g);
      }

      // Chat
      async function sendChat() {
        if (!chatMsg.trim() || !gs || !me) return;
        const msg = {name:me.name, text:chatMsg.trim(), color:me.color, t:Date.now(), from: myIndex,
          to: chatTarget, toName: chatTarget!==null ? gs.players[chatTarget]?.name : null};
        const newChat = [...(gs.chat||[]), msg].slice(-60);
        setChatMsg("");
        await push({...gs, chat:newChat});
      }

      // ── RENDER ──────────────────────────────────────────────────────────────
      const ipt = {background:"#1b1f2e",border:"1px solid #333",borderRadius:8,padding:"10px 12px",color:"#fff",fontSize:15,outline:"none",width:"100%",display:"block"};

      function ResCounter({res, val, setVal, max}) {
        return (
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <button onClick={()=>setVal(v=>Math.max(0,v-1))} style={{background:"#333",border:"none",borderRadius:4,color:"#fff",width:28,height:28,fontSize:16,cursor:"pointer"}}>−</button>
            <span style={{color:"#fff",fontWeight:700,minWidth:20,textAlign:"center"}}>{val}</span>
            <button onClick={()=>setVal(v=>Math.min(max,v+1))} style={{background:"#333",border:"none",borderRadius:4,color:"#fff",width:28,height:28,fontSize:16,cursor:"pointer"}}>+</button>
          </div>
        );
      }

      // HOME
      if (screen === "home") return (
        <div style={{minHeight:"100vh",background:"#1b1f2e",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{width:"100%",maxWidth:400}}>
            <h1 style={{color:"#f4a261",textAlign:"center",fontSize:34,fontWeight:900,marginBottom:4}}>Handelswege</h1>
            <p style={{color:"#555",textAlign:"center",marginBottom:28,fontSize:13}}>Alle spielen gleichzeitig · 2–4 Spieler</p>
            <div style={{background:"#252a3a",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
              <div style={{color:"#555",fontSize:11,letterSpacing:1,marginBottom:8}}>DEIN NAME</div>
              <input style={ipt} value={myName} onChange={e=>{setMyName(e.target.value);setError("");setFeedback("");}} placeholder="Name eingeben…" maxLength={16}/>
            </div>
            <button onClick={createRoom} disabled={loading} style={{width:"100%",background:"#f4a261",border:"none",borderRadius:12,color:"#1b1f2e",padding:16,fontSize:16,fontWeight:900,cursor:"pointer",marginBottom:12}}>
              🏠 Neuen Raum erstellen
            </button>
            <div style={{background:"#252a3a",borderRadius:14,padding:"14px 16px"}}>
              <div style={{color:"#555",fontSize:11,letterSpacing:1,marginBottom:8}}>RAUM BEITRETEN</div>
              <input style={{...ipt,textTransform:"uppercase",letterSpacing:4,textAlign:"center",fontSize:22,fontWeight:700,marginBottom:10}}
                value={joinCode} onChange={e=>{setJoinCode(e.target.value.toUpperCase());setError("");setFeedback("");}} placeholder="CODE" maxLength={4}/>
              <button onClick={joinRoom} disabled={loading} style={{width:"100%",background:"#457b9d",border:"none",borderRadius:10,color:"#fff",padding:13,fontSize:15,fontWeight:700,cursor:"pointer"}}>
                Beitreten
              </button>
            </div>
            {error && (
              <div style={{background:"#2a1010",border:"1px solid #e76f51",borderRadius:10,padding:"10px 14px",marginTop:12,textAlign:"center",color:"#e76f51",fontSize:13}}>
                {error}
              </div>
            )}
            {feedback && !error && (
              <div style={{background:"#0e2a1a",border:"1px solid #2a9d8f",borderRadius:10,padding:"10px 14px",marginTop:12,textAlign:"center",color:"#2a9d8f",fontSize:13}}>
                {feedback}
              </div>
            )}
            <div style={{textAlign:"center",color:"#333",fontSize:11,marginTop:18}}>{VERSION}</div>
          </div>
        </div>
      );

      // LOBBY
      if (screen === "lobby") return (
        <div style={{minHeight:"100vh",background:"#1b1f2e",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{width:"100%",maxWidth:400}}>
            <h2 style={{color:"#f4a261",textAlign:"center",fontSize:26,fontWeight:900,marginBottom:6}}>Warteraum</h2>
            <div style={{textAlign:"center",marginBottom:24}}>
              <div style={{color:"#555",fontSize:12,marginBottom:8}}>Code für andere Spieler:</div>
              <div style={{color:"#fff",fontSize:44,fontWeight:900,letterSpacing:10,background:"#252a3a",borderRadius:12,padding:"14px 0",marginBottom:10}}>{roomCode}</div>
              <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                <CopyButton text={roomCode} label="📋 Code kopieren" />
                <button onClick={()=>{
                  const url = window.location.href;
                  if(navigator.share) navigator.share({title:"Handelswege",text:"Tritt meinem Spiel bei! Code: "+roomCode,url});
                  else navigator.clipboard.writeText(url+"?code="+roomCode);
                }}
                  style={{background:"#f4a261",border:"none",borderRadius:8,color:"#1b1f2e",padding:"8px 14px",fontSize:13,cursor:"pointer",fontWeight:700}}>
                  🔗 Link teilen
                </button>
              </div>
            </div>
            <div style={{background:"#252a3a",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{color:"#555",fontSize:11,letterSpacing:1,marginBottom:10}}>SPIELER ({(gs&&gs.players?gs.players.length:0)}/4)</div>
              {(gs&&gs.players?gs.players:[]).map((p,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<gs.players.length-1?"1px solid #333":"none"}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:p.color}}/>
                  <span style={{color:"#fff",fontWeight:i===myIndex?700:400}}>{p.name}</span>
                  {i===0&&<span style={{color:"#f4a261",fontSize:11,marginLeft:"auto"}}>Host</span>}
                  {i===myIndex&&i!==0&&<span style={{color:"#2a9d8f",fontSize:11,marginLeft:"auto"}}>Du</span>}
                  {isHost&&i!==0&&i!==myIndex&&(
                    <button onClick={()=>kickPlayer(i)}
                      style={{background:"#e76f51",border:"none",borderRadius:6,color:"#fff",padding:"3px 8px",fontSize:11,cursor:"pointer",marginLeft:"auto"}}>
                      Kick
                    </button>
                  )}
                </div>
              ))}
            </div>
            {isHost
              ? <button onClick={startGame} disabled={!gs||gs.players.length<2}
                  style={{width:"100%",background:gs&&gs.players.length>=2?"#2a9d8f":"#333",border:"none",borderRadius:12,color:"#fff",padding:16,fontSize:16,fontWeight:900,cursor:"pointer",marginBottom:10}}>
                  {gs&&gs.players.length>=2?"Spiel starten → "+gs.players.length+" Spieler":"Warte auf Spieler… (mind. 2)"}
                </button>
              : <div style={{color:"#555",textAlign:"center",fontSize:14,padding:16}}>Warte auf Host…</div>
            }
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
              <button onClick={leaveRoom}
                style={{background:"#252a3a",border:"1px solid #444",borderRadius:10,color:"#aaa",padding:"10px",fontSize:14,cursor:"pointer",fontWeight:600}}>
                🚪 Verlassen
              </button>
              {isHost && (
                <button onClick={deleteRoom}
                  style={{background:"#2a1010",border:"1px solid #e76f51",borderRadius:10,color:"#e76f51",padding:"10px",fontSize:14,cursor:"pointer",fontWeight:600}}>
                  🗑 Lobby löschen
                </button>
              )}
            </div>
            {error&&<div style={{color:"#e76f51",textAlign:"center",fontSize:13,marginTop:10}}>{error}</div>}
          </div>
        </div>
      );

      // FINISHED
      if (gs && gs.phase === "finished") {
        const ranked = (gs.players||[]).map((p,i)=>({...p,vp:calcVP(p),idx:i})).sort((a,b)=>b.vp-a.vp);
        return (
          <div style={{minHeight:"100vh",background:"#1b1f2e",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{width:"100%",maxWidth:400,textAlign:"center"}}>
              <div style={{fontSize:60,marginBottom:8}}>🏆</div>
              <h2 style={{color:"#fff",fontSize:28,marginBottom:4}}>{ranked[0].name} gewinnt!</h2>
              <p style={{color:"#666",marginBottom:28}}>Runde {gs.round-1} · {ranked[0].vp} VP</p>
              <div style={{background:"#252a3a",borderRadius:14,padding:20,marginBottom:24}}>
                {ranked.map((p,rank)=>(
                  <div key={p.idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:rank<ranked.length-1?"1px solid #2e2e2e":"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:18}}>{["🥇","🥈","🥉","4."][rank]}</span>
                      <div style={{width:8,height:8,borderRadius:"50%",background:p.color}}/>
                      <span style={{color:"#fff",fontWeight:600}}>{p.name}</span>
                    </div>
                    <span style={{color:p.color,fontWeight:800,fontSize:20}}>{p.vp} VP</span>
                  </div>
                ))}
              </div>
              <button onClick={()=>{clearSession();setScreen("home");setGs(null);setMyIndex(null);setIsHost(false);setRoomCode("");setJoinCode("");setError("");}}
                style={{width:"100%",background:"#f4a261",border:"none",borderRadius:12,color:"#1b1f2e",padding:14,fontSize:16,fontWeight:800,cursor:"pointer"}}>
                Zurück zum Menü
              </button>
            </div>
          </div>
        );
      }

      // GAME
      if (!gs||!gs.players||myIndex===null||!me) return (
        <div style={{minHeight:"100vh",background:"#1b1f2e",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{color:"#555",fontSize:16}}>Verbinde…</div>
        </div>
      );

      const myInc = calcIncome(me);
      const hasHafen = (me.buildings["hafen"]||0) > 0;
      const readyCount = gs.players.filter(p=>p.ready).length;
      const myOffers = (gs.tradeOffers||[]).filter(o=>o.from===myIndex);
      const offersForMe = (gs.tradeOffers||[]).filter(o=>o.to===myIndex);

      return (
        <div style={{minHeight:"100vh",background:"#1b1f2e",display:"flex",flexDirection:"row",alignItems:"flex-start"}}>
          {/* Main game column */}
          <div style={{flex:1,minWidth:0,padding:"12px 12px 40px",maxWidth:620,marginRight:270}}>

            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,position:"relative"}}>
              <button onClick={()=>setMenuOpen(m=>!m)}
                style={{background:"#252a3a",border:"none",borderRadius:8,color:"#fff",padding:"7px 12px",fontSize:18,cursor:"pointer",lineHeight:1}}>
                ☰
              </button>
              <span style={{color:"#f4a261",fontWeight:800,fontSize:14}}>Runde {gs.round} · {roomCode}</span>
              <span style={{color:"#333",fontSize:10}}>{readyCount}/{gs.players.length} bereit · {VERSION}</span>

              {/* Dropdown menu */}
              {menuOpen && (
                <div style={{position:"absolute",top:40,left:0,background:"#252a3a",borderRadius:12,padding:8,zIndex:200,minWidth:200,boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>
                  <div style={{color:"#555",fontSize:10,letterSpacing:1,padding:"4px 10px 8px"}}>MENÜ</div>
                  <button onClick={restartGame}
                    style={{width:"100%",background:"none",border:"none",borderRadius:8,color:"#fff",padding:"10px 12px",fontSize:14,textAlign:"left",cursor:"pointer",display:"block"}}>
                    🔄 Neues Spiel starten
                  </button>
                  <button onClick={returnToLobby}
                    style={{width:"100%",background:"none",border:"none",borderRadius:8,color:"#fff",padding:"10px 12px",fontSize:14,textAlign:"left",cursor:"pointer",display:"block"}}>
                    🚪 Zurück zur Lobby
                  </button>
                  <button onClick={()=>{if(!window.confirm("Spiel wirklich verlassen?"))return;clearSession();setMenuOpen(false);setScreen("home");setGs(null);setMyIndex(null);setIsHost(false);setRoomCode("");}}
                    style={{width:"100%",background:"none",border:"none",borderRadius:8,color:"#e76f51",padding:"10px 12px",fontSize:14,textAlign:"left",cursor:"pointer",display:"block"}}>
                    ✕ Spiel verlassen
                  </button>
                  <div style={{borderTop:"1px solid #333",margin:"6px 0"}}/>
                  <CopyMenuButton text={roomCode} label={"📋 Code kopieren: "+roomCode} onDone={()=>setMenuOpen(false)} />
                  <button onClick={()=>{
                    const url = window.location.origin+window.location.pathname;
                    if(navigator.share) navigator.share({title:"Handelswege",text:"Tritt meinem Spiel bei! Code: "+roomCode,url});
                    else navigator.clipboard.writeText(url);
                    setMenuOpen(false);
                  }}
                    style={{width:"100%",background:"none",border:"none",borderRadius:8,color:"#aaa",padding:"10px 12px",fontSize:14,textAlign:"left",cursor:"pointer",display:"block"}}>
                    🔗 Link teilen
                  </button>
                  {isHost && gs.players.filter((_,i)=>i!==myIndex).length>0 && (
                    <div>
                      <div style={{borderTop:"1px solid #333",margin:"6px 0"}}/>
                      <div style={{color:"#555",fontSize:10,letterSpacing:1,padding:"4px 12px"}}>SPIELER KICKEN</div>
                      {gs.players.map((p,i)=>i!==myIndex&&(
                        <button key={i} onClick={()=>{kickPlayer(i);setMenuOpen(false);}}
                          style={{width:"100%",background:"none",border:"none",borderRadius:8,color:"#e76f51",padding:"8px 12px",fontSize:13,textAlign:"left",cursor:"pointer",display:"block"}}>
                          ✕ {p.name} kicken
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Round start toast */}
            {roundToast && (
              <div style={{
                position:"fixed", top:16, left:"50%", transform:"translateX(-50%)", zIndex:250,
                background:"#1b1f2e", border:"2px solid #f4a261", borderRadius:12,
                padding:"10px 20px", color:"#f4a261", fontWeight:800, fontSize:14,
                boxShadow:"0 6px 20px rgba(0,0,0,0.5)",
              }}>
                {roundToast}
              </div>
            )}

            {/* Raid alert popup */}
            {raidAlert && (
              <div onClick={()=>setRaidAlert(null)} style={{
                position:"fixed", inset:0, zIndex:300,
                display:"flex", alignItems:"center", justifyContent:"center",
                background:"rgba(0,0,0,0.7)", padding:20,
              }}>
                <div style={{
                  background: raidAlert.type==="bandit" ? "#1a1606" : "#1a0a2a",
                  border: "3px solid " + (raidAlert.type==="bandit" ? "#e9c46a" : "#9b59b6"),
                  borderRadius:16, padding:"28px 24px", maxWidth:360, width:"100%", textAlign:"center",
                  boxShadow:"0 0 40px " + (raidAlert.type==="bandit" ? "#e9c46a66" : "#9b59b666"),
                }}>
                  <div style={{fontSize:52, marginBottom:12}}>
                    {raidAlert.type==="bandit" ? "🏛️" : "🗡️"}
                  </div>
                  <div style={{color:"#fff", fontSize:15, fontWeight:700, lineHeight:1.6, marginBottom:16}}>
                    {raidAlert.msg}
                  </div>
                  <div style={{color:"#555", fontSize:12}}>Tippen zum Schließen</div>
                </div>
              </div>
            )}

            {/* Menu overlay to close on outside click */}
            {menuOpen && (
              <div onClick={()=>setMenuOpen(false)}
                style={{position:"fixed",inset:0,zIndex:199}}/>
            )}

            {/* VP board */}
            <div style={{display:"grid",gridTemplateColumns:"repeat("+gs.players.length+",1fr)",gap:6,marginBottom:12}}>
              {gs.players.map((p,i)=>{
                const vp = calcVP(p);
                return (
                  <div key={i} style={{background:i===myIndex?p.color+"22":"#252a3a",border:"2px solid "+(i===myIndex?p.color:"#2e2e2e"),borderRadius:10,padding:"8px 4px",textAlign:"center"}}>
                    <div style={{color:p.color,fontSize:10,fontWeight:700}}>{(p.name.length>6?p.name.slice(0,6)+"…":p.name)}</div>
                    <div style={{color:"#fff",fontSize:20,fontWeight:900}}>{vp}</div>
                    <div style={{color:"#444",fontSize:10}}>/ {WIN_VP} VP</div>
                    <div style={{marginTop:3,height:3,background:"#333",borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",width:Math.min(100,vp/WIN_VP*100)+"%",background:p.color}}/>
                    </div>
                    {p.ready && <div style={{color:"#2a9d8f",fontSize:10,marginTop:2}}>✓ bereit</div>}
                  </div>
                );
              })}
            </div>

            {/* My Resources */}
            <div style={{background:"#252a3a",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
              <div style={{color:"#555",fontSize:11,letterSpacing:1,marginBottom:8}}>MEINE RESSOURCEN</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                {RESOURCES.map(r=>(
                  <div key={r} style={{background:"#1b1f2e",borderRadius:8,padding:"8px 4px",textAlign:"center"}}>
                    <div style={{fontSize:18}}>{RES_ICONS[r]}</div>
                    <div style={{color:"#fff",fontWeight:800,fontSize:20}}>{me.resources[r]||0}</div>
                    <div style={{color:"#555",fontSize:10}}>{r}</div>
                    {(myInc[r]||0)>0&&<div style={{color:"#2a9d8f",fontSize:10}}>+{myInc[r]}/Rd</div>}
                  </div>
                ))}
              </div>
              {(me.pendingBuilds||[]).map((pb, i) => (
                <div key={i} style={{marginTop:8,background:"#1b1f2e",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:"#f4a261",fontSize:13}}>
                    🏗 {BUILDINGS.find(b=>b.id===pb.bid)?.icon} {BUILDINGS.find(b=>b.id===pb.bid)?.name} Stufe {pb.level} geplant
                  </span>
                  <button onClick={()=>cancelBuild(i)} style={{background:"#e76f51",border:"none",borderRadius:6,color:"#fff",padding:"4px 10px",fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                </div>
              ))}
              {me.pendingRaeuber && (
                <div style={{marginTop:4,background:"#1b1f2e",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:"#e76f51",fontSize:13}}>🗡️ Überfall auf {gs.players[me.pendingRaeuber.target]?.name} geplant</span>
                  <button onClick={cancelRaid} style={{background:"#555",border:"none",borderRadius:6,color:"#fff",padding:"4px 10px",fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                </div>
              )}
            </div>

            {/* Village map */}
            <div style={{background:"#252a3a",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
              <div style={{color:"#555",fontSize:11,letterSpacing:1,marginBottom:8}}>🏘️ MEIN DORF</div>
              <VillageMap player={me}/>
            </div>

            {/* Actions — only if not ready */}
            {!me.ready && (
              <div style={{background:"#252a3a",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                <div style={{color:"#555",fontSize:11,letterSpacing:1,marginBottom:10}}>AKTIONEN</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
                  {[{key:"bank",label:"💱 Bank",col:"#457b9d"},{key:"player",label:"🤝 Handeln",col:"#9b59b6"},{key:"build",label:"🏗 Bauen",col:"#f4a261"},{key:"raid",label:"🗡️ Räuber",col:"#e76f51"}].map(({key,label,col})=>(
                    <button key={key}
                      onClick={()=>{setPanel(p=>p===key?null:key); if(key!=="bank"){setBankRes(null);} if(key!=="player"){resetTrade();}}}
                      style={{background:panel===key?col:"#3a3f52",border:"2px solid "+(panel===key?col:"transparent"),borderRadius:8,color:"#fff",padding:"11px 6px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                      {label}
                    </button>
                  ))}
                </div>

                {/* Bank */}
                {panel==="bank"&&(
                  <div style={{background:"#1b1f2e",borderRadius:10,padding:12,marginTop:10}}>
                    <div style={{color:"#666",fontSize:12,marginBottom:8}}>{hasHafen?"Hafen: alle Tausche 2:1":"Bank-Tausch:"}</div>
                    {[
                      {label:"Ressource → Gold", trades: hasHafen
                        ? [{give:"Holz",amt:2,get:"Gold",label:"2🪵→1🪙"},{give:"Getreide",amt:2,get:"Gold",label:"2🌾→1🪙"},{give:"Stein",amt:2,get:"Gold",label:"2🪨→1🪙"}]
                        : BANK_TRADES.filter(t=>t.get==="Gold")},
                      {label:"Gold → Ressource (2:1)", trades: BANK_TRADES.filter(t=>t.give==="Gold")},
                    ].map(section=>(
                      <div key={section.label} style={{marginBottom:10}}>
                        <div style={{color:"#555",fontSize:10,letterSpacing:1,marginBottom:5}}>{section.label}</div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                          {section.trades.map((t,i)=>{
                            const canDo = (me.resources[t.give]||0) >= t.amt;
                            return (
                              <button key={i} onClick={()=>canDo&&doBankTrade(t)}
                                style={{background:canDo?"#252a3a":"#1b1f2e",border:"1px solid "+(canDo?"#457b9d":"#222"),borderRadius:8,padding:"8px 4px",cursor:canDo?"pointer":"default",opacity:canDo?1:0.4,textAlign:"center"}}>
                                <div style={{color:"#fff",fontSize:12,fontWeight:700}}>{t.label}</div>
                                <div style={{color:"#555",fontSize:10}}>({me.resources[t.give]||0})</div>
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* Player trade */}
                {panel==="player"&&(
                  <div style={{background:"#1b1f2e",borderRadius:10,padding:12,marginTop:10}}>
                    <div style={{color:"#666",fontSize:12,marginBottom:8}}>Angebot an wen? (wird sofort reserviert)</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                      {gs.players.map((p,i)=>i!==myIndex&&(
                        <button key={i} onClick={()=>setPtTarget(i)}
                          style={{background:ptTarget===i?p.color+"44":"#252a3a",border:"1px solid "+(ptTarget===i?p.color:"#333"),borderRadius:6,color:"#fff",padding:"6px 10px",fontSize:13,cursor:"pointer"}}>
                          <span style={{color:p.color}}>●</span> {p.name}
                        </button>
                      ))}
                    </div>
                    {ptTarget!==null&&(
                      <div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                          <div>
                            <div style={{color:"#888",fontSize:11,marginBottom:6}}>Ich gebe:</div>
                            {RESOURCES.map(r=>(
                              <div key={r} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                                <span style={{color:"#aaa",fontSize:12}}>{RES_ICONS[r]} ({me.resources[r]||0})</span>
                                <ResCounter res={r} val={ptOffer[r]} setVal={v=>setPtOffer(o=>({...o,[r]:v(o[r])}))} max={me.resources[r]||0}/>
                              </div>
                            ))}
                          </div>
                          <div>
                            <div style={{color:"#888",fontSize:11,marginBottom:6}}>Ich will:</div>
                            {RESOURCES.map(r=>(
                              <div key={r} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                                <span style={{color:"#aaa",fontSize:12}}>{RES_ICONS[r]} ({gs.players[ptTarget]?gs.players[ptTarget].resources[r]||0:0})</span>
                                <ResCounter res={r} val={ptWant[r]} setVal={v=>setPtWant(o=>({...o,[r]:v(o[r])}))} max={gs.players[ptTarget]?gs.players[ptTarget].resources[r]||0:0}/>
                              </div>
                            ))}
                          </div>
                        </div>
                        <button onClick={sendTradeOffer} style={{width:"100%",background:"#9b59b6",border:"none",borderRadius:8,color:"#fff",padding:10,fontWeight:700,fontSize:14,cursor:"pointer"}}>
                          Angebot senden an {gs.players[ptTarget]?gs.players[ptTarget].name:""}
                        </button>
                      </div>
                    )}
                  </div>
                )}

                {/* Build */}
                {panel==="build"&&(
                  <div style={{background:"#1b1f2e",borderRadius:10,padding:10,marginTop:10}}>
                    <div style={{color:"#666",fontSize:12,marginBottom:8}}>Bauen / Upgraden — wird am Rundenende angewandt</div>
                    <div style={{color:"#888",fontSize:11,marginBottom:8}}>
                      🏗 {(me.pendingBuilds||[]).length}/{MAX_BUILDS_PER_ROUND} geplant — jedes weitere Gebäude in dieser Runde kostet mehr!
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      {BUILDINGS.map(b=>{
                        const pending = me.pendingBuilds||[];
                        const plannedForThis = pending.filter(pb=>pb.bid===b.id).length;
                        const cur = (me.buildings[b.id]||0) + plannedForThis;
                        const maxed = cur>=3;
                        const nxt = cur+1;
                        const bd = maxed?b.levels[2]:b.levels[nxt-1];
                        const mult = BUILD_MULTI_MULT[pending.length] || BUILD_MULTI_MULT[BUILD_MULTI_MULT.length-1];
                        const scaledCost = maxed ? bd.cost : scaleCost(bd.cost, mult);
                        const atLimit = pending.length >= MAX_BUILDS_PER_ROUND;
                        const ok = !maxed && !atLimit && canAfford(me.resources, scaledCost);
                        return (
                          <button key={b.id} onClick={()=>ok&&doBuild(b.id)}
                            style={{background:maxed?"#1a3a1a":(plannedForThis>0?"#1e2a3a":(ok?"#252a3a":"#1b1f2e")),border:"1px solid "+(maxed?"#2a9d8f":(ok?"#444":"#222")),borderRadius:8,padding:"8px 10px",textAlign:"left",cursor:ok?"pointer":"default",opacity:maxed?0.7:(ok?1:(plannedForThis>0?0.7:0.4))}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:2}}>
                              <div><span style={{fontSize:14}}>{b.icon}</span><span style={{color:"#fff",fontWeight:700,fontSize:12,marginLeft:4}}>{b.name}</span></div>
                              <LevelDots level={cur}/>
                            </div>
                            <div style={{color:"#666",fontSize:10,marginBottom:4}}>
                              {maxed?"MAX "+bd.desc:(cur>0?"→ Stufe "+nxt+": "+bd.desc:bd.desc)}
                            </div>
                            {!maxed&&(
                              <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                                {Object.entries(scaledCost).map(([r,v])=>(
                                  <span key={r} style={{background:"#333",borderRadius:4,padding:"1px 5px",fontSize:10,color:(me.resources[r]||0)>=v?"#2a9d8f":"#e76f51"}}>{RES_ICONS[r]}{v}</span>
                                ))}
                                <span style={{background:"#333",borderRadius:4,padding:"1px 5px",fontSize:10,color:"#f4a261"}}>+{bd.vp}VP</span>
                                {mult>1 && <span style={{background:"#3a2a10",borderRadius:4,padding:"1px 5px",fontSize:10,color:"#f4a261"}}>×{mult}</span>}
                              </div>
                            )}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Raid panel */}
            {panel==="raid"&&!me.ready&&(
              <div style={{background:"#252a3a",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                <div style={{color:"#e76f51",fontSize:11,letterSpacing:1,marginBottom:8}}>🗡️ RÄUBER — klaut am Rundenende, keine Siegpunkte</div>
                {me.pendingRaeuber && (
                  <div style={{background:"#1b1f2e",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <span style={{color:"#e76f51",fontSize:13}}>🗡️ Überfall auf {gs.players[me.pendingRaeuber.target]?.name} (Stufe {me.pendingRaeuber.level}) geplant</span>
                    <button onClick={cancelRaid} style={{background:"#555",border:"none",borderRadius:6,color:"#fff",padding:"4px 10px",fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                  </div>
                )}
                {!me.pendingRaeuber && (
                  <div>
                    <div style={{color:"#666",fontSize:12,marginBottom:8}}>Wen überfallen?</div>
                    {gs.players.map((p,i)=>i!==myIndex&&(
                      <div key={i} style={{background:"#1b1f2e",borderRadius:10,padding:10,marginBottom:8}}>
                        <div style={{color:p.color,fontWeight:700,fontSize:13,marginBottom:8}}>{p.name}</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                          {RAEUBER_LEVELS.map((rd,lvl)=>{
                            const ok = canAfford(me.resources, rd.cost);
                            return (
                              <button key={lvl} onClick={()=>ok&&doRaid(i,lvl+1)}
                                style={{background:ok?"#3a1a1a":"#1b1f2e",border:"1px solid "+(ok?"#e76f51":"#333"),borderRadius:8,padding:"8px 6px",cursor:ok?"pointer":"default",opacity:ok?1:0.4}}>
                                <div style={{color:"#e76f51",fontSize:16,marginBottom:2}}>{"🗡️".repeat(lvl+1)}</div>
                                <div style={{color:"#e76f51",fontSize:10,fontWeight:700}}>Stufe {lvl+1}</div>
                                <div style={{color:"#888",fontSize:10}}>{rd.desc}</div>
                                <div style={{display:"flex",gap:2,justifyContent:"center",marginTop:4}}>
                                  {Object.entries(rd.cost).map(([r,v])=>(
                                    <span key={r} style={{background:"#333",borderRadius:3,padding:"1px 4px",fontSize:10,color:(me.resources[r]||0)>=v?"#e76f51":"#555"}}>{RES_ICONS[r]}{v}</span>
                                  ))}
                                </div>
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* Incoming trade offers */}
            {offersForMe.length > 0 && (
              <div style={{background:"#252a3a",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                <div style={{color:"#9b59b6",fontSize:11,letterSpacing:1,marginBottom:8}}>HANDELSANGEBOTE FÜR DICH</div>
                {offersForMe.map(offer=>(
                  <div key={offer.id} style={{background:"#1b1f2e",borderRadius:10,padding:12,marginBottom:8}}>
                    <div style={{color:offer.fromColor,fontWeight:700,fontSize:13,marginBottom:8}}>{offer.fromName} bietet:</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                      <div>
                        <div style={{color:"#888",fontSize:11,marginBottom:4}}>Du bekommst:</div>
                        {Object.entries(offer.offer).filter(([,v])=>v>0).map(([r,v])=>(
                          <div key={r} style={{color:"#2a9d8f",fontSize:14,fontWeight:700}}>{RES_ICONS[r]} {v}x {r}</div>
                        ))}
                        {Object.values(offer.offer).every(v=>v===0)&&<div style={{color:"#555"}}>nichts</div>}
                      </div>
                      <div>
                        <div style={{color:"#888",fontSize:11,marginBottom:4}}>Du gibst:</div>
                        {Object.entries(offer.want).filter(([,v])=>v>0).map(([r,v])=>(
                          <div key={r} style={{color:"#e76f51",fontSize:14,fontWeight:700}}>{RES_ICONS[r]} {v}x {r}</div>
                        ))}
                        {Object.values(offer.want).every(v=>v===0)&&<div style={{color:"#555"}}>nichts</div>}
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      <button onClick={()=>declineTrade(offer)} style={{background:"#e76f51",border:"none",borderRadius:8,color:"#fff",padding:10,fontWeight:700,cursor:"pointer"}}>❌ Ablehnen</button>
                      <button onClick={()=>acceptTrade(offer)} style={{background:"#2a9d8f",border:"none",borderRadius:8,color:"#fff",padding:10,fontWeight:700,cursor:"pointer"}}>✅ Annehmen</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* My outgoing offers */}
            {myOffers.length > 0 && (
              <div style={{background:"#252a3a",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                <div style={{color:"#555",fontSize:11,letterSpacing:1,marginBottom:8}}>MEINE OFFENEN ANGEBOTE</div>
                {myOffers.map(offer=>(
                  <div key={offer.id} style={{background:"#1b1f2e",borderRadius:10,padding:10,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{color:"#aaa",fontSize:12}}>→ {offer.toName}: {Object.entries(offer.offer).filter(([,v])=>v>0).map(([r,v])=>v+RES_ICONS[r]).join(" ")||"nichts"} für {Object.entries(offer.want).filter(([,v])=>v>0).map(([r,v])=>v+RES_ICONS[r]).join(" ")||"nichts"}</span>
                    <button onClick={()=>cancelOwnOffer(offer)} style={{background:"#e76f51",border:"none",borderRadius:6,color:"#fff",padding:"4px 8px",fontSize:11,cursor:"pointer"}}>✕</button>
                  </div>
                ))}
              </div>
            )}

            {/* Ready button */}
            <button onClick={markReady}
              style={{width:"100%",background:me.ready?"#1a3a1a":"#2a9d8f",border:"2px solid "+(me.ready?"#2a9d8f":"#2a9d8f"),borderRadius:12,color:me.ready?"#2a9d8f":"#fff",padding:15,fontSize:16,fontWeight:800,cursor:"pointer",marginBottom:10}}>
              {me.ready?"↩ Bereit aufheben ("+readyCount+"/"+gs.players.length+")":"✓ Runde abschließen ("+readyCount+"/"+gs.players.length+" bereit)"}
            </button>

            {/* Log */}
            <div style={{background:"#252a3a",borderRadius:10,padding:"8px 12px",marginBottom:10,maxHeight:80,overflowY:"auto"}}>
              {(gs.log||[]).map((l,i)=>(
                <div key={i} style={{color:i===0?"#bbb":"#555",fontSize:12,padding:"2px 0"}}>{l}</div>
              ))}
            </div>

          </div>{/* end main column */}

          {/* Chat sidebar — fixed, full height, no scroll needed */}
          <div style={{
            width:270, minWidth:220, maxWidth:300,
            position:"fixed", top:0, right:0, bottom:0,
            background:"#1a1e2c", borderLeft:"1px solid #252a3a",
            display:"flex", flexDirection:"column",
            zIndex:50,
          }}>
            <div style={{color:"#555",fontSize:11,letterSpacing:1,padding:"12px 14px 6px",borderBottom:"1px solid #252a3a",flexShrink:0}}>
              💬 CHAT
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"6px 12px",minHeight:0}}>
              {(gs.chat||[]).length===0&&<div style={{color:"#444",fontSize:13,padding:"8px 0"}}>Noch keine Nachrichten…</div>}
              {(gs.chat||[]).filter(m => m.to==null || m.from===myIndex || m.to===myIndex).map((m,i)=>(
                <div key={i} style={{marginBottom:6}}>
                  {m.to!=null && (
                    <span style={{color:"#9b59b6",fontSize:10,fontWeight:700,marginRight:4}}>
                      🔒 {m.from===myIndex ? "an "+m.toName : "privat"}
                    </span>
                  )}
                  <span style={{color:m.color,fontWeight:700,fontSize:13}}>{m.name}</span>
                  <span style={{color:"#444",fontSize:11}}> · </span>
                  <span style={{color:"#bbb",fontSize:13}}>{m.text}</span>
                </div>
              ))}
              <div ref={chatEndRef}/>
            </div>
            <div style={{padding:"6px 10px 0",borderTop:"1px solid #252a3a",flexShrink:0}}>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
                <button onClick={()=>setChatTarget(null)}
                  style={{background:chatTarget===null?"#457b9d":"#252a3a",border:"none",borderRadius:6,color:"#fff",padding:"3px 8px",fontSize:11,cursor:"pointer"}}>
                  Alle
                </button>
                {gs.players.map((p,i)=>i!==myIndex&&(
                  <button key={i} onClick={()=>setChatTarget(i)}
                    style={{background:chatTarget===i?"#9b59b6":"#252a3a",border:"none",borderRadius:6,color:"#fff",padding:"3px 8px",fontSize:11,cursor:"pointer"}}>
                    🔒 {p.name}
                  </button>
                ))}
              </div>
            </div>
            <div style={{padding:"0 10px 10px",borderTop:"none",display:"flex",gap:6,flexShrink:0}}>
              <input value={chatMsg} onChange={e=>setChatMsg(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&sendChat()}
                placeholder={chatTarget===null?"Nachricht…":"Privat an "+gs.players[chatTarget]?.name+"…"} maxLength={80}
                style={{flex:1,background:"#252a3a",border:"1px solid "+(chatTarget===null?"#333":"#9b59b6"),borderRadius:8,padding:"8px 10px",color:"#fff",fontSize:13,outline:"none"}}/>
              <button onClick={sendChat} style={{background:chatTarget===null?"#457b9d":"#9b59b6",border:"none",borderRadius:8,color:"#fff",padding:"8px 12px",fontWeight:700,fontSize:15,cursor:"pointer"}}>➤</button>
            </div>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
