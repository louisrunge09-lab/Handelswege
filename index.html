                ))}
              </div>
              <button onClick={startSolo} disabled={loading} className="cta-purple"
                style={{width:"100%",background:"linear-gradient(135deg,#9b59b6,#7d3c98)",border:"none",borderRadius:10,color:"#fff",padding:"13px 0",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                🤖 Solo gegen {numAI} KI spielen
              </button>
            </div>

            {/* Join room */}
            <div className="home-card home-sect" style={{background:"#1e2233",border:"1px solid #2a2e42",borderRadius:14,padding:"14px 16px"}}>
              <div style={{color:"#4a5070",fontSize:10,letterSpacing:1.5,marginBottom:8,textTransform:"uppercase",fontWeight:600}}>Raum beitreten</div>
              <input className="code-input"
                style={{...ipt,fontFamily:"'Courier New',Courier,monospace",textTransform:"uppercase",letterSpacing:8,textAlign:"center",fontSize:24,fontWeight:900,marginBottom:10,background:"#13172280",border:"1px solid #2e3450",transition:"border-color 0.2s,box-shadow 0.2s",color:"#e8f0ff"}}
                value={joinCode} onChange={e=>{setJoinCode(e.target.value.toUpperCase());setError("");setFeedback("");}}
                placeholder="ABCD" maxLength={4} autoComplete="off" spellCheck={false}/>
              <button onClick={joinRoom} disabled={loading} className="cta-blue"
                style={{width:"100%",background:"linear-gradient(135deg,#457b9d,#2d6a8f)",border:"none",borderRadius:10,color:"#fff",padding:"13px 0",fontSize:15,fontWeight:700,cursor:"pointer"}}>
                🚪 Beitreten
              </button>
            </div>

            {error && (
              <div style={{background:"rgba(42,16,16,0.9)",border:"1px solid #e76f51",borderRadius:10,padding:"10px 14px",marginTop:10,textAlign:"center",color:"#e76f51",fontSize:13,animation:"fade-up-in 0.25s ease"}}>
                {error}
              </div>
            )}
            {feedback && !error && (
              <div style={{background:"rgba(14,42,26,0.9)",border:"1px solid #2a9d8f",borderRadius:10,padding:"10px 14px",marginTop:10,textAlign:"center",color:"#2a9d8f",fontSize:13,animation:"fade-up-in 0.25s ease"}}>
                {feedback}
              </div>
            )}

            <div style={{textAlign:"center",marginTop:16,display:"flex",justifyContent:"center",alignItems:"center",gap:16}}>
              <button onClick={()=>setShowTutorial(true)} style={{background:"none",border:"none",color:"#3a4060",fontSize:12,cursor:"pointer",transition:"color 0.15s"}}
                onMouseEnter={e=>e.target.style.color="#6a7090"} onMouseLeave={e=>e.target.style.color="#3a4060"}>
                ❓ Wie spielt man?
              </button>
            </div>
          </div>
          {showTutorial && <TutorialOverlay onClose={()=>{setShowTutorial(false);localStorage.setItem("hwt","1");}}/>}
        </div>
      );

      // LOBBY
      if (screen === "lobby") return (
        <div style={{minHeight:"100vh",background:"#1b1f2e",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{width:"100%",maxWidth:400}}>
            <h2 style={{color:"#f4a261",textAlign:"center",fontSize:26,fontWeight:900,marginBottom:6}}>Warteraum</h2>
            <div style={{textAlign:"center",marginBottom:24}}>
              <div style={{color:"#555",fontSize:12,marginBottom:8}}>Code für andere Spieler:</div>
              <div style={{color:"#fff",fontSize:44,fontWeight:900,letterSpacing:10,background:"#252a3a",borderRadius:12,padding:"14px 0",marginBottom:10}}>{roomCode}</div>
              <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                <CopyButton text={roomCode} label="📋 Code kopieren" />
                <button onClick={()=>{
                  const url = window.location.href;
                  if(navigator.share) navigator.share({title:"Handelswege",text:"Tritt meinem Spiel bei! Code: "+roomCode,url});
                  else navigator.clipboard.writeText(url+"?code="+roomCode);
                }}
                  style={{background:"#f4a261",border:"none",borderRadius:8,color:"#1b1f2e",padding:"8px 14px",fontSize:13,cursor:"pointer",fontWeight:700}}>
                  🔗 Link teilen
                </button>
              </div>
            </div>
            <div style={{background:"#252a3a",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
              <div style={{color:"#555",fontSize:11,letterSpacing:1,marginBottom:10}}>SPIELER ({(gs&&gs.players?gs.players.length:0)}/10)</div>
              {(gs&&gs.players?gs.players:[]).map((p,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<gs.players.length-1?"1px solid #333":"none"}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:p.color}}/>
                  <span style={{color:"#fff",fontWeight:i===myIndex?700:400}}>{p.name}</span>
                  {i===0&&<span style={{color:"#f4a261",fontSize:11,marginLeft:"auto"}}>Host</span>}
                  {i===myIndex&&i!==0&&<span style={{color:"#2a9d8f",fontSize:11,marginLeft:"auto"}}>Du</span>}
                  {isHost&&i!==0&&i!==myIndex&&(
                    <button onClick={()=>kickPlayer(i)}
                      style={{background:"#e76f51",border:"none",borderRadius:6,color:"#fff",padding:"3px 8px",fontSize:11,cursor:"pointer",marginLeft:"auto"}}>
                      Kick
                    </button>
                  )}
                </div>
              ))}
            </div>
            {/* Game mode toggle */}
            <div style={{background:"#252a3a",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
              <div style={{color:"#555",fontSize:11,letterSpacing:1,marginBottom:8}}>SPIELMODUS</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                {Object.entries(MODES).map(([id, m])=>{
                  const active = (gs?.gameMode||"schnell")===id;
                  return (
                    <button key={id} onClick={()=>setGameMode(id)}
                      disabled={!isHost}
                      style={{
                        background:active?"#2a9d8f22":"#1b1f2e",
                        border:"2px solid "+(active?"#2a9d8f":"#333"),
                        borderRadius:10,padding:"10px 6px",cursor:isHost?"pointer":"default",textAlign:"center",
                      }}>
                      <div style={{color:"#fff",fontWeight:700,fontSize:12}}>{m.label}</div>
                      <div style={{color:active?"#2a9d8f":"#555",fontSize:10,marginTop:2}}>{m.desc}</div>
                    </button>
                  );
                })}
              </div>
              {!isHost&&<div style={{color:"#444",fontSize:11,textAlign:"center",marginTop:6}}>Nur der Host kann den Modus ändern</div>}
            </div>

            {isHost
              ? <button onClick={startGame} disabled={!gs||gs.players.length<2}
                  style={{width:"100%",background:gs&&gs.players.length>=2?"#2a9d8f":"#333",border:"none",borderRadius:12,color:"#fff",padding:16,fontSize:16,fontWeight:900,cursor:"pointer",marginBottom:10}}>
                  {gs&&gs.players.length>=2?"Spiel starten → "+gs.players.length+" Spieler":"Warte auf Spieler… (mind. 2)"}
                </button>
              : <div style={{color:"#555",textAlign:"center",fontSize:14,padding:16}}>Warte auf Host…</div>
            }
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
              <button onClick={leaveRoom}
                style={{background:"#252a3a",border:"1px solid #444",borderRadius:10,color:"#aaa",padding:"10px",fontSize:14,cursor:"pointer",fontWeight:600}}>
                🚪 Verlassen
              </button>
              {isHost && (
                <button onClick={deleteRoom}
                  style={{background:"#2a1010",border:"1px solid #e76f51",borderRadius:10,color:"#e76f51",padding:"10px",fontSize:14,cursor:"pointer",fontWeight:600}}>
                  🗑 Lobby löschen
                </button>
              )}
            </div>
            {/* Timer toggle */}
            {isHost && (
              <div style={{background:"#252a3a",borderRadius:12,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{color:"#fff",fontSize:13,fontWeight:700}}>⏱ Rundenzeit-Limit</div>
                  <div style={{color:"#555",fontSize:11}}>{gs?.timeLimit ? gs.timeLimit+"s pro Runde — dann auto-bereit" : "Kein Limit"}</div>
                </div>
                <div style={{display:"flex",gap:5}}>
                  {[null,60,90,120].map(t=>(
                    <button key={t} onClick={()=>push({...gs,timeLimit:t})}
                      style={{background:(gs?.timeLimit||null)===t?"#f4a261":"#1b1f2e",border:"1px solid "+(gs?.timeLimit===t?"#f4a261":"#333"),borderRadius:6,color:"#fff",padding:"4px 8px",fontSize:11,cursor:"pointer"}}>
                      {t===null?"Aus":t+"s"}
                    </button>
                  ))}
                </div>
              </div>
            )}
            {/* Lobby chat */}
            <div style={{background:"#252a3a",borderRadius:12,padding:"10px 14px",marginBottom:8}}>
              <div style={{color:"#555",fontSize:11,letterSpacing:1,marginBottom:6}}>💬 CHAT</div>
              <div style={{maxHeight:80,overflowY:"auto",marginBottom:6}}>
                {(gs?.chat||[]).length===0&&<div style={{color:"#444",fontSize:12}}>Noch keine Nachrichten…</div>}
                {(gs?.chat||[]).map((m,i)=>(
                  <div key={i} style={{fontSize:12,marginBottom:2}}>
                    <span style={{color:m.color,fontWeight:700}}>{m.name}: </span>
                    <span style={{color:"#bbb"}}>{m.text}</span>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:6}}>
                <input value={chatMsg} onChange={e=>setChatMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()}
                  placeholder="Nachricht…" maxLength={80}
                  style={{flex:1,background:"#1b1f2e",border:"1px solid #333",borderRadius:7,padding:"7px 10px",color:"#fff",fontSize:13,outline:"none"}}/>
                <button onClick={sendChat} style={{background:"#457b9d",border:"none",borderRadius:7,color:"#fff",padding:"7px 12px",fontWeight:700,cursor:"pointer"}}>➤</button>
              </div>
            </div>
            {error&&<div style={{color:"#e76f51",textAlign:"center",fontSize:13,marginTop:10}}>{error}</div>}
          </div>
        </div>
      );

      // FINISHED
      if (gs && gs.phase === "finished") {
        const ranked = (gs.players||[]).map((p,i)=>({...p,vp:calcVP(p),idx:i})).sort((a,b)=>b.vp-a.vp);
        const st = gs.stats || {};
        const medals = ["🥇","🥈","🥉","4.","5.","6.","7.","8.","9.","10."];
        // Fun facts
        const mostBuilt = gs.players.reduce((best,p,i)=>(st.buildsTotal[i]||0)>(st.buildsTotal[best]||0)?i:best,0);
        const mostHit   = gs.players.reduce((best,p,i)=>(st.raidsReceived[i]||0)>(st.raidsReceived[best]||0)?i:best,0);
        const mostLed   = gs.players.reduce((best,p,i)=>(st.roundsLed[i]||0)>(st.roundsLed[best]||0)?i:best,0);
        return (
          <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0d1117,#131825)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <StarField/>
            <div style={{width:"100%",maxWidth:420,position:"relative",zIndex:1}}>
              <div style={{textAlign:"center",marginBottom:20}}>
                <div style={{fontSize:56,marginBottom:6}}>🏆</div>
                <h2 style={{color:"#f4a261",fontSize:26,fontWeight:900,marginBottom:2}}>{ranked[0].name} gewinnt!</h2>
                <p style={{color:"#555",fontSize:13}}>Runde {gs.round-1} · {ranked[0].vp} VP · {gs.gameMode}</p>
              </div>

              {/* Rangliste */}
              <div style={{background:"#252a3a",borderRadius:14,padding:"14px 16px",marginBottom:12}}>
                <div style={{color:"#555",fontSize:10,letterSpacing:1,marginBottom:10}}>RANGLISTE</div>
                {ranked.map((p,rank)=>(
                  <div key={p.idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:rank<ranked.length-1?"1px solid #1e2230":"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:16}}>{medals[rank]||rank+1+"."}</span>
                      <div style={{width:8,height:8,borderRadius:"50%",background:p.color}}/>
                      <span style={{color:"#fff",fontWeight:600,fontSize:14}}>{p.name}</span>
                    </div>
                    <span style={{color:p.color,fontWeight:900,fontSize:18}}>{p.vp} VP</span>
                  </div>
                ))}
              </div>

              {/* Statistiken */}
              <div style={{background:"#252a3a",borderRadius:14,padding:"14px 16px",marginBottom:12}}>
                <div style={{color:"#555",fontSize:10,letterSpacing:1,marginBottom:10}}>STATISTIKEN</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat("+Math.min(gs.players.length,4)+",1fr)",gap:6,marginBottom:10}}>
                  {gs.players.map((p,i)=>(
                    <div key={i} style={{background:"#1b1f2e",borderRadius:10,padding:"8px 6px",textAlign:"center"}}>
                      <div style={{color:p.color,fontWeight:800,fontSize:11,marginBottom:6}}>{p.name.length>7?p.name.slice(0,7)+"…":p.name}</div>
                      <div style={{color:"#aaa",fontSize:10,marginBottom:2}}>🏗 {st.buildsTotal?.[i]||0} Gebäude</div>
                      <div style={{color:"#aaa",fontSize:10,marginBottom:2}}>⚔️ {st.raidsReceived?.[i]||0} Treffer</div>
                      <div style={{color:"#aaa",fontSize:10,marginBottom:2}}>👑 {st.roundsLed?.[i]||0} Runden</div>
                      <div style={{color:"#aaa",fontSize:10}}>🔬 {st.techsBought?.[i]||0} Techs</div>
                    </div>
                  ))}
                </div>
                <div style={{borderTop:"1px solid #1e2230",paddingTop:10,display:"flex",flexDirection:"column",gap:4}}>
                  {(st.buildsTotal?.[mostBuilt]||0)>0&&<div style={{color:"#f4a261",fontSize:12}}>🏗 Meiste Gebäude: <b>{gs.players[mostBuilt]?.name}</b> ({st.buildsTotal[mostBuilt]})</div>}
                  {(st.raidsReceived?.[mostHit]||0)>0&&<div style={{color:"#e76f51",fontSize:12}}>⚔️ Meist überfallen: <b>{gs.players[mostHit]?.name}</b> ({st.raidsReceived[mostHit]}×)</div>}
                  {(st.roundsLed?.[mostLed]||0)>0&&<div style={{color:"#e9c46a",fontSize:12}}>👑 Längste Führung: <b>{gs.players[mostLed]?.name}</b> ({st.roundsLed[mostLed]} Runden)</div>}
                </div>
              </div>

              {/* Finale Gebäude */}
              <div style={{background:"#252a3a",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
                <div style={{color:"#555",fontSize:10,letterSpacing:1,marginBottom:8}}>FINALE DÖRFER</div>
                {gs.players.map((p,i)=>(
                  <div key={i} style={{marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:p.color,fontSize:11,fontWeight:700,minWidth:60}}>{p.name.length>7?p.name.slice(0,7)+"…":p.name}</span>
                    <span style={{fontSize:18}}>{BUILDINGS.filter(b=>(p.buildings[b.id]||0)>0).map(b=>b.icon+(p.buildings[b.id]>1?""+p.buildings[b.id]:"")).join(" ")||"—"}</span>
                  </div>
                ))}
              </div>

              <button onClick={()=>{clearSession();setScreen("home");setGs(null);setMyIndex(null);setIsHost(false);setRoomCode("");setJoinCode("");setError("");setIsSolo(false);}}
                style={{width:"100%",background:"linear-gradient(135deg,#f4a261,#e76f51)",border:"none",borderRadius:12,color:"#1b1f2e",padding:14,fontSize:16,fontWeight:900,cursor:"pointer"}}>
                Zurück zum Menü
              </button>
            </div>
          </div>
        );
      }

      // SPECTATOR VIEW
      if (isSpectator && gs && gs.players) return (
        <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0d1117,#131825)",padding:16,position:"relative"}}>
          <StarField/>
          <div style={{position:"relative",zIndex:1,maxWidth:500,margin:"0 auto"}}>
            <div style={{textAlign:"center",marginBottom:16}}>
              <span style={{background:"#9b59b6",borderRadius:8,padding:"4px 12px",color:"#fff",fontSize:12,fontWeight:700}}>👁 ZUSCHAUER</span>
              <div style={{color:"#f4a261",fontWeight:800,fontSize:16,marginTop:8}}>Runde {gs.round} · {roomCode}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {gs.players.map((p,i)=>(
                <div key={i} style={{background:"#252a3a",borderRadius:12,padding:12,border:"1px solid #2e2e2e"}}>
                  <div style={{color:p.color,fontWeight:800,fontSize:14,marginBottom:6}}>{p.name} · {calcVP(p)} VP</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                    {RESOURCES.map(r=><div key={r} style={{color:"#aaa",fontSize:12}}>{RES_ICONS[r]} {p.resources[r]||0}</div>)}
                  </div>
                  <div style={{marginTop:6,display:"flex",gap:4,flexWrap:"wrap"}}>
                    {BUILDINGS.filter(b=>(p.buildings[b.id]||0)>0).map(b=><span key={b.id} style={{fontSize:16}}>{b.icon}</span>)}
                  </div>
                  <div style={{marginTop:4,height:3,background:"#333",borderRadius:2}}>
                    <div style={{height:"100%",width:Math.min(100,calcVP(p)/getWinVP(gs)*100)+"%",background:p.color,borderRadius:2}}/>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:"#252a3a",borderRadius:10,padding:"8px 12px",marginTop:12,maxHeight:120,overflowY:"auto"}}>
              {(gs.log||[]).map((l,i)=><div key={i} style={{color:i===0?"#bbb":"#555",fontSize:12,padding:"2px 0"}}>{l}</div>)}
            </div>
            <button onClick={()=>{setIsSpectator(false);setScreen("home");setGs(null);}} style={{width:"100%",background:"#333",border:"none",borderRadius:10,color:"#aaa",padding:12,marginTop:12,cursor:"pointer",fontWeight:700}}>Verlassen</button>
          </div>
        </div>
      );

      // GAME
      if (!gs||!gs.players||myIndex===null||!me) return (
        <div style={{minHeight:"100vh",background:"#1b1f2e",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{color:"#555",fontSize:16}}>Verbinde…</div>
        </div>
      );

      const myInc = calcIncome(me, gs.gameMode);
      const hasHafen = (me.buildings["hafen"]||0) > 0;
      const readyCount = gs.players.filter(p=>p.ready).length;
      const myOffers = (gs.tradeOffers||[]).filter(o=>o.from===myIndex);
      const offersForMe = (gs.tradeOffers||[]).filter(o=>o.to===myIndex);

      return (
        <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0d1117 0%,#131825 60%,#0d1117 100%)",display:"flex",flexDirection:"row",alignItems:"flex-start",position:"relative"}}>
          <StarField/>
          {/* Floating resource numbers */}
          {floaters.map(f=>(
            <div key={f.id} className="floater" style={{left:f.x+"%",top:f.y+"%",color:f.color}}>{f.text}</div>
          ))}
          {/* Main game column */}
          <div style={{flex:1,minWidth:0,padding:"12px 12px 40px",maxWidth:620,marginRight:isMobile?0:270,paddingBottom:isMobile?100:40}}>

            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,position:"relative"}}>
              <button onClick={()=>setMenuOpen(m=>!m)}
                style={{background:"#252a3a",border:"none",borderRadius:8,color:"#fff",padding:"7px 12px",fontSize:18,cursor:"pointer",lineHeight:1}}>
                ☰
              </button>
              <div style={{textAlign:"center"}}>
                <div style={{color:"#f4a261",fontWeight:900,fontSize:18,lineHeight:1}}>Runde {gs.round}</div>
                <div style={{color:"#3a4060",fontSize:10,letterSpacing:1}}>{roomCode} · {(MODES[gs.gameMode]||MODES.normal).label}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {timerSec!==null&&<span style={{color:timerSec<=10?"#e76f51":"#2a9d8f",fontWeight:900,fontSize:16,minWidth:36,textAlign:"center",background:timerSec<=10?"rgba(231,111,81,0.1)":"rgba(42,157,143,0.1)",borderRadius:8,padding:"3px 6px"}}>⏱{timerSec}s</span>}
                <div style={{textAlign:"center"}}>
                  <div style={{color:readyCount===gs.players.length?"#e9c46a":"#2a9d8f",fontWeight:700,fontSize:12}}>{readyCount}/{gs.players.length}</div>
                  <div style={{color:"#3a4060",fontSize:9}}>bereit</div>
                </div>
              </div>

              {/* Dropdown menu */}
              {menuOpen && (
                <div style={{position:"absolute",top:40,left:0,background:"#252a3a",borderRadius:12,padding:8,zIndex:200,minWidth:200,boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>
                  <div style={{color:"#555",fontSize:10,letterSpacing:1,padding:"4px 10px 8px"}}>MENÜ</div>
                  <button onClick={restartGame}
                    style={{width:"100%",background:"none",border:"none",borderRadius:8,color:"#fff",padding:"10px 12px",fontSize:14,textAlign:"left",cursor:"pointer",display:"block"}}>
                    🔄 Neues Spiel starten
                  </button>
                  {!isSolo && <button onClick={returnToLobby}
                    style={{width:"100%",background:"none",border:"none",borderRadius:8,color:"#fff",padding:"10px 12px",fontSize:14,textAlign:"left",cursor:"pointer",display:"block"}}>
                    🚪 Zurück zur Lobby
                  </button>}
                  <button onClick={()=>{if(!isSolo&&!window.confirm("Spiel wirklich verlassen?"))return;clearSession();setMenuOpen(false);setScreen("home");setGs(null);setMyIndex(null);setIsHost(false);setRoomCode("");setIsSolo(false);}}
                    style={{width:"100%",background:"none",border:"none",borderRadius:8,color:"#e76f51",padding:"10px 12px",fontSize:14,textAlign:"left",cursor:"pointer",display:"block"}}>
                    ✕ Spiel verlassen
                  </button>
                  <div style={{borderTop:"1px solid #333",margin:"6px 0"}}/>
                  <CopyMenuButton text={roomCode} label={"📋 Code kopieren: "+roomCode} onDone={()=>setMenuOpen(false)} />
                  <button onClick={()=>{
                    const url = window.location.origin+window.location.pathname;
                    if(navigator.share) navigator.share({title:"Handelswege",text:"Tritt meinem Spiel bei! Code: "+roomCode,url});
                    else navigator.clipboard.writeText(url);
                    setMenuOpen(false);
                  }}
                    style={{width:"100%",background:"none",border:"none",borderRadius:8,color:"#aaa",padding:"10px 12px",fontSize:14,textAlign:"left",cursor:"pointer",display:"block"}}>
                    🔗 Link teilen
                  </button>
                  {isHost && gs.players.filter((_,i)=>i!==myIndex).length>0 && (
                    <div>
                      <div style={{borderTop:"1px solid #333",margin:"6px 0"}}/>
                      <div style={{color:"#555",fontSize:10,letterSpacing:1,padding:"4px 12px"}}>SPIELER KICKEN</div>
                      {gs.players.map((p,i)=>i!==myIndex&&(
                        <button key={i} onClick={()=>{kickPlayer(i);setMenuOpen(false);}}
                          style={{width:"100%",background:"none",border:"none",borderRadius:8,color:"#e76f51",padding:"8px 12px",fontSize:13,textAlign:"left",cursor:"pointer",display:"block"}}>
                          ✕ {p.name} kicken
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Round start toast */}
            {roundToast && (
              <div style={{
                position:"fixed", top:16, left:"50%", transform:"translateX(-50%)", zIndex:250,
                background:"#1b1f2e", border:"2px solid #f4a261", borderRadius:12,
                padding:"10px 20px", color:"#f4a261", fontWeight:800, fontSize:14,
                boxShadow:"0 6px 20px rgba(0,0,0,0.5)",
              }}>
                {roundToast}
              </div>
            )}

            {/* Raid alert popup */}
            {raidAlert && (
              <div onClick={()=>setRaidAlert(null)} style={{
                position:"fixed", inset:0, zIndex:300,
                display:"flex", alignItems:"center", justifyContent:"center",
                background:"rgba(0,0,0,0.7)", padding:20,
              }}>
                <div style={{
                  background: raidAlert.type==="bandit" ? "#1a1606" : "#1a0a2a",
                  border: "3px solid " + (raidAlert.type==="bandit" ? "#e9c46a" : "#9b59b6"),
                  borderRadius:16, padding:"28px 24px", maxWidth:360, width:"100%", textAlign:"center",
                  boxShadow:"0 0 40px " + (raidAlert.type==="bandit" ? "#e9c46a66" : "#9b59b666"),
                }}>
                  <div style={{fontSize:52, marginBottom:12}}>
                    {raidAlert.type==="bandit" ? "🏛️" : "🗡️"}
                  </div>
                  <div style={{color:"#fff", fontSize:15, fontWeight:700, lineHeight:1.6, marginBottom:16}}>
                    {raidAlert.msg}
                  </div>
                  <div style={{color:"#555", fontSize:12}}>Tippen zum Schließen</div>
                </div>
              </div>
            )}

            {/* Round summary modal */}
            <RoundSummaryModal summary={roundSummary} onClose={()=>setRoundSummary(null)}/>

            {/* Alliance offers for me */}
            {(gs.allianceOffers||[]).filter(o=>o.to===myIndex).map((offer,i)=>(
              <div key={i} style={{position:"fixed",bottom:80,right:280,zIndex:350,background:"#1b1f2e",border:"2px solid #9b59b6",borderRadius:12,padding:"12px 14px",maxWidth:240,boxShadow:"0 6px 20px rgba(0,0,0,0.5)"}}>
                <div style={{color:"#9b59b6",fontWeight:800,fontSize:13,marginBottom:6}}>🤝 Allianz-Angebot</div>
                <div style={{color:"#bbb",fontSize:12,marginBottom:10}}>{gs.players[offer.from]?.name} möchte 3 Runden Waffenstillstand</div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>acceptAlliance(offer)} style={{flex:1,background:"#9b59b6",border:"none",borderRadius:7,color:"#fff",padding:"6px 0",fontWeight:700,fontSize:12,cursor:"pointer"}}>Annehmen</button>
                  <button onClick={()=>declineAlliance(offer)} style={{flex:1,background:"#333",border:"none",borderRadius:7,color:"#aaa",padding:"6px 0",fontSize:12,cursor:"pointer"}}>Ablehnen</button>
                </div>
              </div>
            ))}

            {/* Menu overlay to close on outside click */}
            {menuOpen && (
              <div onClick={()=>setMenuOpen(false)}
                style={{position:"fixed",inset:0,zIndex:199}}/>
            )}

            {/* VP board */}
            <div style={{display:"grid",gridTemplateColumns:"repeat("+gs.players.length+",1fr)",gap:5,marginBottom:10}}>
              {gs.players.map((p,i)=>{
                const vp = calcVP(p);
                const totalRes = RESOURCES.reduce((s,r)=>s+(p.resources[r]||0),0);
                const isMe = i===myIndex;
                const allied = isAllied(myIndex,i);
                return (
                  <div key={i} className={"player-card"+(isMe?" player-card-me":"")}
                    style={{background:isMe?p.color+"18":"#1c2030",border:"2px solid "+(isMe?p.color:p.ready?"#2a9d8f44":"#252b3d"),borderRadius:12,padding:"8px 4px 6px",textAlign:"center",position:"relative"}}>
                    {/* Ready dot */}
                    <div style={{position:"absolute",top:5,right:5,width:6,height:6,borderRadius:"50%",background:p.ready?"#2a9d8f":"#333",boxShadow:p.ready?"0 0 6px #2a9d8f":""}}/>
                    {/* Avatar circle */}
                    <div style={{width:22,height:22,borderRadius:"50%",background:p.color,margin:"0 auto 4px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,color:"#fff",flexShrink:0}}>
                      {p.name[0].toUpperCase()}
                    </div>
                    <div style={{color:p.color,fontSize:9,fontWeight:700,marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 4px"}}>
                      {isMe?"Du":p.name.length>6?p.name.slice(0,6)+"…":p.name}
                    </div>
                    <div style={{color:"#fff",fontSize:18,fontWeight:900,lineHeight:1}}>{vp}</div>
                    <div style={{color:"#3a4060",fontSize:9,marginBottom:3}}>/{getWinVP(gs)}</div>
                    <div style={{height:3,background:"#252b3d",borderRadius:2,overflow:"hidden",margin:"0 4px"}}>
                      <div className="vp-bar-fill" style={{height:"100%",width:Math.min(100,vp/getWinVP(gs)*100)+"%",background:`linear-gradient(90deg,${p.color},${p.color}bb)`,boxShadow:`0 0 6px ${p.color}66`}}/>
                    </div>
                    <div style={{color:"#3a4060",fontSize:9,marginTop:3}}>
                      {allied&&i!==myIndex?"🤝 ":""}{totalRes}📦
                    </div>
                  </div>
                );
              })}
            </div>

            {/* My Resources */}
            <div className="game-section">
              <div className="section-label">Meine Ressourcen</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                {RESOURCES.map(r=>(
                  <div key={r} className="res-card" title={r+(myInc[r]>0?" · +"+myInc[r]+"/Runde":"")} style={{background:"linear-gradient(160deg,#1e2436,#141928)",borderRadius:10,padding:"10px 4px",textAlign:"center",border:"1px solid #252b3d",boxShadow:"0 2px 8px rgba(0,0,0,0.3)"}}>
                    <div style={{fontSize:20}}>{RES_ICONS[r]}</div>
                    <div style={{color:"#fff",fontWeight:900,fontSize:22,lineHeight:1.1}}>{me.resources[r]||0}</div>
                    <div style={{color:"#3a4060",fontSize:9,marginTop:1}}>{r}</div>
                    <div className="res-inc" style={{color:(myInc[r]||0)>0?"#2a9d8f":"transparent",fontSize:10,fontWeight:700,marginTop:2}}>{(myInc[r]||0)>0?"+"+myInc[r]+"/Rd":"·"}</div>
                  </div>
                ))}
              </div>
              {(me.pendingBuilds||[]).map((pb, i) => (
                <div key={i} style={{marginTop:8,background:"#1b1f2e",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:"#f4a261",fontSize:13}}>
                    🏗 {BUILDINGS.find(b=>b.id===pb.bid)?.icon} {BUILDINGS.find(b=>b.id===pb.bid)?.name} Stufe {pb.level} geplant
                  </span>
                  <button onClick={()=>cancelBuild(i)} style={{background:"#e76f51",border:"none",borderRadius:6,color:"#fff",padding:"4px 10px",fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                </div>
              ))}
              {me.pendingRaeuber && (
                <div style={{marginTop:4,background:"#1b1f2e",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:"#e76f51",fontSize:13}}>🗡️ Überfall auf {gs.players[me.pendingRaeuber.target]?.name} geplant</span>
                  <button onClick={cancelRaid} style={{background:"#555",border:"none",borderRadius:6,color:"#fff",padding:"4px 10px",fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                </div>
              )}
            </div>

            {/* Village map */}
            <div className="game-section">
              <div className="section-label">🏘️ Mein Dorf</div>
              <VillageMap player={me}/>
            </div>

            {/* Actions — only if not ready */}
            {!me.ready && (
              <div className="game-section">
                <div className="section-label">Aktionen</div>
                {/* Primary actions */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
                  {[{key:"build",label:"🏗️",sublabel:"Bauen",col:"#f4a261"},{key:"player",label:"🤝",sublabel:"Handel",col:"#9b59b6"}].map(({key,label,sublabel,col})=>(
                    <button key={key} className="action-tab"
                      onClick={()=>{setPanel(p=>p===key?null:key); if(key!=="player")resetTrade();}}
                      style={{background:panel===key?col+"22":"#13172280",border:"2px solid "+(panel===key?col:"#252b3d"),borderRadius:10,color:panel===key?col:"#8090a8",padding:"12px 6px",fontSize:22,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                      <span>{label}</span>
                      <span style={{fontSize:11,fontWeight:700}}>{sublabel}</span>
                    </button>
                  ))}
                </div>
                {/* Secondary actions */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5}}>
                  {[{key:"bank",label:"💱",sublabel:"Bank",col:"#457b9d"},{key:"raid",label:"⚔️",sublabel:"Überfall",col:"#e76f51"},{key:"tech",label:"🔬",sublabel:"Technik",col:"#2a9d8f"}].map(({key,label,sublabel,col})=>(
                    <button key={key} className="action-tab"
                      onClick={()=>{setPanel(p=>p===key?null:key); if(key!=="bank")setBankRes(null);}}
                      style={{background:panel===key?col+"22":"#13172280",border:"1px solid "+(panel===key?col:"#252b3d"),borderRadius:9,color:panel===key?col:"#607088",padding:"9px 4px",fontSize:18,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <span>{label}</span>
                      <span style={{fontSize:10,color:panel===key?col:"#4a5070",fontWeight:600}}>{sublabel}</span>
                    </button>
                  ))}
                </div>

                {/* Bank */}
                {panel==="bank"&&(
                  <div style={{background:"#13172280",borderRadius:12,padding:"12px 10px",marginTop:10,border:"1px solid #1e2235"}}>
                    {(()=>{
                      const hasHaendler = (me.activeTechs||[]).includes("haendler");
                      const bonus2to1 = hasHafen || hasHaendler;
                      const bonusSource = hasHaendler ? "Händler-Tech" : "Hafen";
                      const sellTrades = bonus2to1
                        ? [{give:"Holz",amt:2,get:"Gold"},{give:"Getreide",amt:2,get:"Gold"},{give:"Stein",amt:2,get:"Gold"}]
                        : BANK_TRADES.filter(t=>t.get==="Gold");
                      const buyTrades = BANK_TRADES.filter(t=>t.give==="Gold");
                      const RES_COLOR = {Holz:"#c8823a",Stein:"#8090a8",Getreide:"#c8a840",Gold:"#e9c46a"};

                      function TradeCard({t, accent}) {
                        const stock = me.resources[t.give]||0;
                        const canDo = stock >= t.amt;
                        const need = t.amt - stock;
                        return (
                          <button onClick={()=>canDo&&doBankTrade(t)}
                            className={canDo?"action-tab":""}
                            style={{
                              background: canDo ? "linear-gradient(160deg,#1e2436,#181d2e)" : "#111520",
                              border: "1px solid "+(canDo ? accent+"55" : "#1e2235"),
                              borderRadius:10, padding:"10px 8px", cursor:canDo?"pointer":"default",
                              textAlign:"center", width:"100%",
                              opacity: canDo ? 1 : 0.55,
                            }}>
                            <div style={{fontSize:22,marginBottom:4}}>{RES_ICONS[t.give]}</div>
                            <div style={{color:"#c8d0e8",fontSize:11,fontWeight:700,marginBottom:6}}>
                              {t.give}
                            </div>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,marginBottom:8}}>
                              <span style={{color:RES_COLOR[t.give]||"#aaa",fontWeight:900,fontSize:14}}>{t.amt}</span>
                              <span style={{color:"#3a4060",fontSize:12}}>→</span>
                              <span style={{color:RES_COLOR[t.get]||"#aaa",fontWeight:900,fontSize:14}}>1</span>
                              <span style={{fontSize:14}}>{RES_ICONS[t.get]}</span>
                            </div>
                            {canDo ? (
                              <div style={{background:accent+"22",border:"1px solid "+accent+"44",borderRadius:6,padding:"4px 0",color:accent,fontSize:11,fontWeight:700}}>
                                Tauschen
                              </div>
                            ) : (
                              <div style={{color:"#3a4060",fontSize:10}}>
                                noch {need} {RES_ICONS[t.give]} fehlen
                              </div>
                            )}
                            <div style={{color:"#3a4060",fontSize:10,marginTop:4}}>
                              Bestand: {stock}
                            </div>
                          </button>
                        );
                      }

                      return (<>
                        {bonus2to1 && (
                          <div style={{background:"rgba(244,162,97,0.08)",border:"1px solid rgba(244,162,97,0.25)",borderRadius:8,padding:"6px 10px",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:14}}>⭐</span>
                            <span style={{color:"#f4a261",fontSize:11,fontWeight:700}}>{bonusSource}: alle Tausche 2:1</span>
                          </div>
                        )}
                        <div style={{color:"#3a4060",fontSize:10,letterSpacing:1,fontWeight:700,marginBottom:8}}>💰 RESSOURCEN VERKAUFEN</div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:14}}>
                          {sellTrades.map((t,i)=><TradeCard key={i} t={t} accent="#f4a261"/>)}
                        </div>
                        <div style={{color:"#3a4060",fontSize:10,letterSpacing:1,fontWeight:700,marginBottom:8}}>🏦 RESSOURCEN KAUFEN</div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                          {buyTrades.map((t,i)=><TradeCard key={i} t={t} accent="#457b9d"/>)}
                        </div>
                        <div style={{color:"#2a2e42",fontSize:10,marginTop:10,textAlign:"center"}}>
                          Die Bank tauscht jederzeit — ohne Zustimmung anderer Spieler.
                        </div>
                      </>);
                    })()}
                  </div>
                )}

                {/* Player trade */}
                {panel==="player"&&(
                  <div style={{background:"#13172280",borderRadius:12,padding:"12px 10px",marginTop:10,border:"1px solid #1e2235"}}>

                    {/* Alliances row */}
                    <div style={{marginBottom:12}}>
                      <div style={{color:"#3a4060",fontSize:10,letterSpacing:1.5,fontWeight:700,marginBottom:7}}>ALLIANZEN</div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        {gs.players.map((p,i)=>{ if(i===myIndex) return null;
                          const allied = isAllied(myIndex,i);
                          const offered = (gs.allianceOffers||[]).find(o=>o.from===myIndex&&o.to===i);
                          const theyOffer = (gs.allianceOffers||[]).find(o=>o.from===i&&o.to===myIndex);
                          return (
                            <div key={i} style={{display:"flex",gap:3,alignItems:"center"}}>
                              <button onClick={()=>!allied&&!offered&&!me.ready&&proposeAlliance(i)} className={!allied&&!offered?"action-tab":""} style={{
                                background: allied?"rgba(42,157,143,0.12)":offered?"rgba(155,89,182,0.12)":theyOffer?"rgba(244,162,97,0.12)":"#1c2030",
                                border:"1px solid "+(allied?"#2a9d8f44":offered?"#9b59b644":theyOffer?"#f4a26144":"#252b3d"),
                                borderRadius:8,color:allied?"#2a9d8f":offered?"#9b59b6":theyOffer?"#f4a261":"#607088",
                                padding:"5px 9px",fontSize:11,fontWeight:700,cursor:!allied&&!offered&&!me.ready?"pointer":"default",
                              }}>
                                {allied?"🤝 "+p.name:offered?"⏳ "+p.name:theyOffer?"💌 "+p.name:"🤝 "+p.name}
                              </button>
                              {allied&&!me.ready&&(
                                <button onClick={()=>breakAlliance(i)} style={{background:"rgba(42,16,16,0.8)",border:"1px solid #e76f5155",borderRadius:7,color:"#e76f51",padding:"5px 7px",fontSize:11,cursor:"pointer"}}>💔</button>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Target selection */}
                    <div style={{color:"#3a4060",fontSize:10,letterSpacing:1.5,fontWeight:700,marginBottom:7}}>MIT WEM HANDELN?</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:6,marginBottom:12}}>
                      {gs.players.map((p,i)=>{
                        if(i===myIndex) return null;
                        const totalRes = RESOURCES.reduce((s,r)=>s+(p.resources[r]||0),0);
                        const sel = ptTarget===i;
                        return (
                          <button key={i} onClick={()=>{setPtTarget(i);resetTrade();}} className="action-tab" style={{
                            background: sel ? p.color+"20" : "#1c2030",
                            border:"2px solid "+(sel?p.color:"#252b3d"),
                            borderRadius:10,padding:"9px 6px",cursor:"pointer",textAlign:"center",
                          }}>
                            <div style={{width:24,height:24,borderRadius:"50%",background:p.color,margin:"0 auto 5px",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:900}}>{p.name[0].toUpperCase()}</div>
                            <div style={{color:sel?p.color:"#8090a8",fontWeight:700,fontSize:11,marginBottom:2}}>{p.name.length>7?p.name.slice(0,7)+"…":p.name}</div>
                            <div style={{color:"#3a4060",fontSize:9}}>{totalRes} 📦</div>
                          </button>
                        );
                      })}
                    </div>

                    {/* Trade form */}
                    {ptTarget!==null&&(()=>{
                      const tgt = gs.players[ptTarget];
                      const offerSummary = Object.entries(ptOffer).filter(([,v])=>v>0).map(([r,v])=>v+RES_ICONS[r]).join(" ");
                      const wantSummary  = Object.entries(ptWant).filter(([,v])=>v>0).map(([r,v])=>v+RES_ICONS[r]).join(" ");
                      const hasOffer = Object.values(ptOffer).some(v=>v>0) || Object.values(ptWant).some(v=>v>0);
                      return (
                        <div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                            {/* Give */}
                            <div style={{background:"rgba(231,111,81,0.07)",border:"1px solid rgba(231,111,81,0.2)",borderRadius:10,padding:"10px 8px"}}>
                              <div style={{color:"#e76f51",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>ICH GEBE</div>
                              {RESOURCES.map(r=>(
                                <div key={r} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                                  <span style={{fontSize:14}}>{RES_ICONS[r]}</span>
                                  <span style={{color:"#3a4060",fontSize:10,flex:1,marginLeft:4}}>{me.resources[r]||0}</span>
                                  <ResCounter res={r} val={ptOffer[r]} setVal={v=>setPtOffer(o=>({...o,[r]:v(o[r])}))} max={me.resources[r]||0}/>
                                </div>
                              ))}
                            </div>
                            {/* Want */}
                            <div style={{background:"rgba(42,157,143,0.07)",border:"1px solid rgba(42,157,143,0.2)",borderRadius:10,padding:"10px 8px"}}>
                              <div style={{color:"#2a9d8f",fontSize:10,fontWeight:700,letterSpacing:1,marginBottom:8}}>ICH WILL</div>
                              {RESOURCES.map(r=>(
                                <div key={r} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                                  <span style={{fontSize:14}}>{RES_ICONS[r]}</span>
                                  <span style={{color:"#3a4060",fontSize:10,flex:1,marginLeft:4}}>{tgt?tgt.resources[r]||0:0}</span>
                                  <ResCounter res={r} val={ptWant[r]} setVal={v=>setPtWant(o=>({...o,[r]:v(o[r])}))} max={tgt?tgt.resources[r]||0:0}/>
                                </div>
                              ))}
                            </div>
                          </div>

                          {/* Summary + send */}
                          {hasOffer && (
                            <div style={{background:"rgba(155,89,182,0.08)",border:"1px solid rgba(155,89,182,0.2)",borderRadius:8,padding:"8px 10px",marginBottom:8,textAlign:"center"}}>
                              <span style={{color:"#e76f51",fontWeight:700,fontSize:12}}>{offerSummary||"nichts"}</span>
                              <span style={{color:"#3a4060",fontSize:12,margin:"0 6px"}}>→</span>
                              <span style={{color:"#2a9d8f",fontWeight:700,fontSize:12}}>{wantSummary||"nichts"}</span>
                            </div>
                          )}
                          <button onClick={sendTradeOffer} className="cta-purple" style={{
                            width:"100%",background:"linear-gradient(135deg,#9b59b6,#7d3c98)",
                            border:"none",borderRadius:10,color:"#fff",padding:"12px 0",
                            fontWeight:700,fontSize:14,cursor:"pointer",
                          }}>
                            Angebot senden an {tgt?.name||""}
                          </button>
                        </div>
                      );
                    })()}
                  </div>
                )}

                {/* Build */}
                {panel==="build"&&(
                  <div style={{background:"#1b1f2e",borderRadius:10,padding:10,marginTop:10}}>
                    <div style={{color:"#666",fontSize:12,marginBottom:8}}>Bauen / Upgraden — wird am Rundenende angewandt</div>
                    <div style={{color:"#888",fontSize:11,marginBottom:8}}>
                      🏗 {(me.pendingBuilds||[]).length}/{MAX_BUILDS_PER_ROUND} geplant — jedes weitere Gebäude in dieser Runde kostet mehr!
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      {BUILDINGS.map(b=>{
                        const pending = me.pendingBuilds||[];
                        const plannedForThis = pending.filter(pb=>pb.bid===b.id).length;
                        const cur = (me.buildings[b.id]||0) + plannedForThis;
                        const maxed = cur>=3;
                        const nxt = cur+1;
                        const bd = maxed?b.levels[2]:b.levels[nxt-1];
                        const mult = BUILD_MULTI_MULT[pending.length] || BUILD_MULTI_MULT[BUILD_MULTI_MULT.length-1];
                        const scaledCost = maxed ? bd.cost : scaleCost(bd.cost, mult * getMode(gs).costMulti);
                        const atLimit = pending.length >= MAX_BUILDS_PER_ROUND;
                        const locked = !meetsReqs(me, b.id);
                        const ok = !maxed && !atLimit && !locked && canAfford(me.resources, scaledCost);
                        return (
                          <button key={b.id} onClick={()=>ok&&doBuild(b.id)}
                            className={ok?"build-card":""}
                            style={{background:maxed?"linear-gradient(135deg,#1a3a1a,#142b14)":(locked?"#111318":(plannedForThis>0?"linear-gradient(135deg,#1e2a3a,#162030)":(ok?"linear-gradient(135deg,#1e2436,#191e2e)":"#141720"))),border:"1px solid "+(maxed?"#2a9d8f":(locked?"#1e1e1e":(ok?"#2e3448":"#1a1d28"))),borderRadius:10,padding:"10px",textAlign:"left",cursor:ok?"pointer":"default",opacity:maxed?0.8:(locked?0.45:(ok?1:(plannedForThis>0?0.7:0.4))),boxShadow:ok?"0 2px 8px rgba(0,0,0,0.4)":"none"}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:2}}>
                              <div><span style={{fontSize:14}}>{locked?"🔒":b.icon}</span><span style={{color:locked?"#555":"#fff",fontWeight:700,fontSize:12,marginLeft:4}}>{b.name}</span></div>
                              <LevelDots level={cur}/>
                            </div>
                            {locked ? (
                              <div style={{color:"#555",fontSize:10}}>{reqLabel(b.id)}</div>
                            ) : (
                              <>
                                <div style={{color:"#666",fontSize:10,marginBottom:4}}>
                                  {maxed?"MAX "+bd.desc:(cur>0?"→ Stufe "+nxt+": "+bd.desc:bd.desc)}
                                </div>
                                {!maxed&&(
                                  <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                                    {Object.entries(scaledCost).map(([r,v])=>(
                                      <span key={r} style={{background:"#333",borderRadius:4,padding:"1px 5px",fontSize:10,color:(me.resources[r]||0)>=v?"#2a9d8f":"#e76f51"}}>{RES_ICONS[r]}{v}</span>
                                    ))}
                                    <span style={{background:"#333",borderRadius:4,padding:"1px 5px",fontSize:10,color:"#f4a261"}}>+{bd.vp}VP</span>
                                    {mult>1 && <span style={{background:"#3a2a10",borderRadius:4,padding:"1px 5px",fontSize:10,color:"#f4a261"}}>×{mult}</span>}
                                  </div>
                                )}
                              </>
                            )}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Raid panel */}
            {panel==="raid"&&!me.ready&&(
              <div className="game-section">
                <div style={{color:"#e76f51",fontSize:11,letterSpacing:1,marginBottom:8}}>⚔️ ÜBERFALL & SABOTAGE</div>
                {/* Tab switcher */}
                <div style={{display:"flex",gap:6,marginBottom:10}}>
                  {[{id:"raid",label:"🗡️ Überfall"},{id:"sabotage",label:"💣 Sabotage"}].map(t=>(
                    <button key={t.id} onClick={()=>setRaidTab(t.id)}
                      style={{flex:1,background:raidTab===t.id?"#e76f5122":"#1b1f2e",border:"1px solid "+(raidTab===t.id?"#e76f51":"#333"),borderRadius:8,color:raidTab===t.id?"#e76f51":"#666",padding:"7px 0",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                      {t.label}
                    </button>
                  ))}
                </div>

                {/* Überfall tab */}
                {raidTab==="raid"&&(<>
                  {me.pendingRaeuber && (
                    <div style={{background:"#1b1f2e",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <span style={{color:"#e76f51",fontSize:13}}>🗡️ Überfall auf {gs.players[me.pendingRaeuber.target]?.name} (Stufe {me.pendingRaeuber.level}) geplant</span>
                      <button onClick={cancelRaid} style={{background:"#555",border:"none",borderRadius:6,color:"#fff",padding:"4px 10px",fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                    </div>
                  )}
                  {!me.pendingRaeuber && (
                    <div>
                      <div style={{color:"#666",fontSize:12,marginBottom:8}}>Wen überfallen?</div>
                      {gs.players.map((p,i)=>i!==myIndex&&(
                        <div key={i} style={{background:"#1b1f2e",borderRadius:10,padding:10,marginBottom:8}}>
                          <div style={{color:p.color,fontWeight:700,fontSize:13,marginBottom:8}}>{p.name}</div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                            {RAEUBER_LEVELS.map((rd,lvl)=>{
                              const ok = canAfford(me.resources, rd.cost);
                              return (
                                <button key={lvl} onClick={()=>ok&&doRaid(i,lvl+1)}
                                  style={{background:ok?"#3a1a1a":"#1b1f2e",border:"1px solid "+(ok?"#e76f51":"#333"),borderRadius:8,padding:"8px 6px",cursor:ok?"pointer":"default",opacity:ok?1:0.4}}>
                                  <div style={{color:"#e76f51",fontSize:16,marginBottom:2}}>{"🗡️".repeat(lvl+1)}</div>
                                  <div style={{color:"#e76f51",fontSize:10,fontWeight:700}}>Stufe {lvl+1}</div>
                                  <div style={{color:"#888",fontSize:10}}>{rd.desc}</div>
                                  <div style={{display:"flex",gap:2,justifyContent:"center",marginTop:4}}>
                                    {Object.entries(rd.cost).map(([r,v])=>(
                                      <span key={r} style={{background:"#333",borderRadius:3,padding:"1px 4px",fontSize:10,color:(me.resources[r]||0)>=v?"#e76f51":"#555"}}>{RES_ICONS[r]}{v}</span>
                                    ))}
                                  </div>
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </>)}

                {/* Sabotage tab */}
                {raidTab==="sabotage"&&(<>
                  {me.pendingSabotage && (
                    <div style={{background:"#1b1f2e",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <span style={{color:"#e76f51",fontSize:13}}>💣 Sabotage: {gs.players[me.pendingSabotage.target]?.name}s {BUILDINGS.find(b=>b.id===me.pendingSabotage.bid)?.name}</span>
                      <button onClick={cancelSabotage} style={{background:"#555",border:"none",borderRadius:6,color:"#fff",padding:"4px 10px",fontSize:12,cursor:"pointer"}}>Abbrechen</button>
                    </div>
                  )}
                  {!me.pendingSabotage && (
                    <div>
                      <div style={{color:"#666",fontSize:12,marginBottom:8}}>Welches Gebäude sabotieren? (Kosten: Lv1=5🪙 Lv2=9🪙 Lv3=14🪙)</div>
                      {gs.players.map((p,i)=>{
                        if (i===myIndex) return null;
                        const built = BUILDINGS.filter(b=>(p.buildings[b.id]||0)>0);
                        if (built.length===0) return null;
                        return (
                          <div key={i} style={{background:"#1b1f2e",borderRadius:10,padding:10,marginBottom:8}}>
                            <div style={{color:p.color,fontWeight:700,fontSize:13,marginBottom:8}}>{p.name}</div>
                            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                              {built.map(b=>{
                                const lvl = p.buildings[b.id];
                                const cost = SABOTAGE_COST[lvl];
                                const ok = (me.resources.Gold||0) >= cost;
                                return (
                                  <button key={b.id} onClick={()=>ok&&doSabotage(i,b.id)}
                                    style={{background:ok?"#3a1a1a":"#1b1f2e",border:"1px solid "+(ok?"#e76f51":"#333"),borderRadius:8,padding:"8px 10px",cursor:ok?"pointer":"default",opacity:ok?1:0.4,textAlign:"center"}}>
                                    <div style={{fontSize:20}}>{b.icon}</div>
                                    <div style={{color:"#fff",fontSize:10,fontWeight:700}}>{b.name}</div>
                                    <div style={{color:"#e76f51",fontSize:10}}>Lv{lvl} → {lvl>1?"Lv"+(lvl-1):"🔥"}</div>
                                    <div style={{color:(me.resources.Gold||0)>=cost?"#e76f51":"#555",fontSize:11,fontWeight:700}}>🪙{cost}</div>
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </>)}
              </div>
            )}

            {/* Tech panel */}
            {panel==="tech"&&!me.ready&&(
              <div className="game-section">
                <div style={{color:"#2a9d8f",fontSize:11,letterSpacing:1,marginBottom:8}}>🔬 TECHNOLOGIE — einmalige Effekte diese Runde</div>
                {(me.activeTechs||[]).length>0&&(
                  <div style={{marginBottom:8,display:"flex",gap:5,flexWrap:"wrap"}}>
                    {(me.activeTechs||[]).map(tid=>{const tc=TECH_CARDS.find(t=>t.id===tid);return tc&&<span key={tid} style={{background:"#1a3a2a",border:"1px solid #2a9d8f",borderRadius:6,color:"#2a9d8f",fontSize:11,padding:"3px 8px"}}>{tc.label} ✓</span>;})}
                  </div>
                )}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                  {TECH_CARDS.map(tc=>{
                    const owned = (me.activeTechs||[]).includes(tc.id);
                    const ok = !owned && canAfford(me.resources, tc.cost);
                    return (
                      <button key={tc.id} onClick={()=>ok&&doTech(tc)}
                        style={{background:owned?"#1a3a2a":ok?"#1a2a3a":"#1b1f2e",border:"1px solid "+(owned?"#2a9d8f":ok?"#2a9d8f44":"#333"),borderRadius:9,padding:"9px 8px",cursor:ok?"pointer":"default",textAlign:"left",opacity:ok||owned?1:0.45}}>
                        <div style={{color:owned?"#2a9d8f":"#fff",fontWeight:700,fontSize:12,marginBottom:2}}>{tc.label}{owned?" ✓":""}</div>
                        <div style={{color:"#666",fontSize:10,marginBottom:5}}>{tc.desc}</div>
                        <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                          {Object.entries(tc.cost).map(([r,v])=>(
                            <span key={r} style={{background:"#252a3a",borderRadius:3,padding:"1px 5px",fontSize:10,color:(me.resources[r]||0)>=v?"#2a9d8f":"#555"}}>{RES_ICONS[r]}{v}</span>
                          ))}
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Incoming trade offers */}
            {offersForMe.length > 0 && (
              <div style={{background:"#252a3a",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                <div style={{color:"#9b59b6",fontSize:11,letterSpacing:1,marginBottom:8}}>HANDELSANGEBOTE FÜR DICH</div>
                {offersForMe.map(offer=>(
                  <div key={offer.id} style={{background:"#1b1f2e",borderRadius:10,padding:12,marginBottom:8}}>
                    <div style={{color:offer.fromColor,fontWeight:700,fontSize:13,marginBottom:8}}>{offer.fromName} bietet:</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                      <div>
                        <div style={{color:"#888",fontSize:11,marginBottom:4}}>Du bekommst:</div>
                        {Object.entries(offer.offer).filter(([,v])=>v>0).map(([r,v])=>(
                          <div key={r} style={{color:"#2a9d8f",fontSize:14,fontWeight:700}}>{RES_ICONS[r]} {v}x {r}</div>
                        ))}
                        {Object.values(offer.offer).every(v=>v===0)&&<div style={{color:"#555"}}>nichts</div>}
                      </div>
                      <div>
                        <div style={{color:"#888",fontSize:11,marginBottom:4}}>Du gibst:</div>
                        {Object.entries(offer.want).filter(([,v])=>v>0).map(([r,v])=>(
                          <div key={r} style={{color:"#e76f51",fontSize:14,fontWeight:700}}>{RES_ICONS[r]} {v}x {r}</div>
                        ))}
                        {Object.values(offer.want).every(v=>v===0)&&<div style={{color:"#555"}}>nichts</div>}
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      <button onClick={()=>declineTrade(offer)} style={{background:"#e76f51",border:"none",borderRadius:8,color:"#fff",padding:10,fontWeight:700,cursor:"pointer"}}>❌ Ablehnen</button>
                      <button onClick={()=>acceptTrade(offer)} style={{background:"#2a9d8f",border:"none",borderRadius:8,color:"#fff",padding:10,fontWeight:700,cursor:"pointer"}}>✅ Annehmen</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* My outgoing offers */}
            {myOffers.length > 0 && (
              <div style={{background:"#252a3a",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
                <div style={{color:"#555",fontSize:11,letterSpacing:1,marginBottom:8}}>MEINE OFFENEN ANGEBOTE</div>
                {myOffers.map(offer=>(
                  <div key={offer.id} style={{background:"#1b1f2e",borderRadius:10,padding:10,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{color:"#aaa",fontSize:12}}>→ {offer.toName}: {Object.entries(offer.offer).filter(([,v])=>v>0).map(([r,v])=>v+RES_ICONS[r]).join(" ")||"nichts"} für {Object.entries(offer.want).filter(([,v])=>v>0).map(([r,v])=>v+RES_ICONS[r]).join(" ")||"nichts"}</span>
                    <button onClick={()=>cancelOwnOffer(offer)} style={{background:"#e76f51",border:"none",borderRadius:6,color:"#fff",padding:"4px 8px",fontSize:11,cursor:"pointer"}}>✕</button>
                  </div>
                ))}
              </div>
            )}

            {/* Ready button */}
            {(() => {
              const allReady = readyCount === gs.players.length;
              return (
                <button onClick={markReady}
                  className={me.ready?(allReady?"all-ready-btn done-btn":"done-btn"):"ready-btn"}
                  style={{
                    width:"100%",
                    background: me.ready
                      ? (allReady?"linear-gradient(135deg,#2a1a00,#1a1500)":"#111820")
                      : "linear-gradient(135deg,#2a9d8f,#1d7a70)",
                    border:"2px solid "+(allReady?"#e9c46a":"#2a9d8f"),
                    borderRadius:12,
                    color: me.ready?(allReady?"#e9c46a":"#2a9d8f"):"#fff",
                    padding:"14px 0",fontSize:15,fontWeight:800,cursor:"pointer",marginBottom:10,
                  }}>
                  {me.ready
                    ? (allReady
                        ? "⚡ Alle bereit — Runde läuft… ("+readyCount+"/"+gs.players.length+")"
                        : "↩ Bereit aufheben  ("+readyCount+"/"+gs.players.length+" bereit)")
                    : "✓ Runde abschließen  ("+readyCount+"/"+gs.players.length+" bereit)"}
                </button>
              );
            })()}

            {/* Log */}
            <div style={{background:"#13172280",border:"1px solid #1e2235",borderRadius:10,padding:"8px 12px",marginBottom:10,maxHeight:90,overflowY:"auto"}}>
              {(gs.log||[]).map((l,i)=>(
                <div key={i} className="log-msg" style={{
                  color:i===0?"#8090b0":"#3a4060",
                  fontSize:11,padding:"2px 0",
                  borderBottom:i===0?"1px solid #1e2235":"none",
                  marginBottom:i===0?4:0,
                  fontWeight:i===0?500:400,
                }}>{l}</div>
              ))}
            </div>

          </div>{/* end main column */}

          {/* Chat sidebar — fixed sidebar on desktop, bottom sheet on mobile */}
          <div style={isMobile ? {
            position:"fixed", bottom:0, left:0, right:0,
            height: chatOpen ? 280 : 44,
            background:"#1a1e2c", borderTop:"1px solid #252a3a",
            display:"flex", flexDirection:"column",
            zIndex:50, transition:"height 0.25s ease",
          } : {
            width:270, minWidth:220, maxWidth:300,
            position:"fixed", top:0, right:0, bottom:0,
            background:"#1a1e2c", borderLeft:"1px solid #252a3a",
            display:"flex", flexDirection:"column",
            zIndex:50,
          }}>
            <div onClick={()=>isMobile&&setChatOpen(o=>!o)}
              style={{color:"#555",fontSize:11,letterSpacing:1,padding:"12px 14px 6px",borderBottom:"1px solid #252a3a",flexShrink:0,cursor:isMobile?"pointer":"default",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>💬 CHAT</span>
              {isMobile && <span style={{color:"#444",fontSize:14}}>{chatOpen?"▼":"▲"}</span>}
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"8px 12px",minHeight:0}}>
              {(gs.chat||[]).length===0&&(
                <div style={{color:"#2a2e42",fontSize:12,padding:"12px 0",textAlign:"center"}}>
                  <div style={{fontSize:20,marginBottom:4,opacity:0.3}}>💬</div>
                  Noch keine Nachrichten…
                </div>
              )}
              {(gs.chat||[]).filter(m => m.to==null || m.from===myIndex || m.to===myIndex).map((m,i)=>{
                const isMe = m.from===myIndex;
                const isPrivate = m.to!=null;
                const ts = m.t ? new Date(m.t).toLocaleTimeString("de",{hour:"2-digit",minute:"2-digit"}) : "";
                return (
                  <div key={i} className="chat-msg" style={{marginBottom:8,padding:"6px 8px",borderRadius:8,background:isMe?"rgba(69,123,157,0.1)":isPrivate?"rgba(155,89,182,0.08)":"transparent",border:isPrivate?"1px solid rgba(155,89,182,0.2)":"none"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}}>
                      <span style={{display:"flex",alignItems:"center",gap:4}}>
                        {isPrivate&&<span style={{color:"#9b59b6",fontSize:9,fontWeight:700}}>🔒{isMe?"→"+m.toName:"privat"}</span>}
                        <span style={{color:m.color,fontWeight:700,fontSize:12}}>{m.name}</span>
                      </span>
                      <span style={{color:"#2a2e42",fontSize:9}}>{ts}</span>
                    </div>
                    <div style={{color:isMe?"#c8d8ff":"#8090a8",fontSize:12,lineHeight:1.4}}>{m.text}</div>
                  </div>
                );
              })}
              <div ref={chatEndRef}/>
            </div>
            <div style={{padding:"6px 10px 0",borderTop:"1px solid #252a3a",flexShrink:0}}>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
                <button onClick={()=>setChatTarget(null)}
                  style={{background:chatTarget===null?"#457b9d":"#252a3a",border:"none",borderRadius:6,color:"#fff",padding:"3px 8px",fontSize:11,cursor:"pointer"}}>
                  Alle
                </button>
                {gs.players.map((p,i)=>i!==myIndex&&(
                  <button key={i} onClick={()=>setChatTarget(i)}
                    style={{background:chatTarget===i?"#9b59b6":"#252a3a",border:"none",borderRadius:6,color:"#fff",padding:"3px 8px",fontSize:11,cursor:"pointer"}}>
                    🔒 {p.name}
                  </button>
                ))}
              </div>
            </div>
            <div style={{padding:"0 10px 10px",borderTop:"none",display:"flex",gap:6,flexShrink:0}}>
              <input value={chatMsg} onChange={e=>setChatMsg(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&sendChat()}
                placeholder={chatTarget===null?"Nachricht…":"Privat an "+gs.players[chatTarget]?.name+"…"} maxLength={80}
                style={{flex:1,background:"#252a3a",border:"1px solid "+(chatTarget===null?"#333":"#9b59b6"),borderRadius:8,padding:"8px 10px",color:"#fff",fontSize:13,outline:"none"}}/>
              <button onClick={sendChat} style={{background:chatTarget===null?"#457b9d":"#9b59b6",border:"none",borderRadius:8,color:"#fff",padding:"8px 12px",fontWeight:700,fontSize:15,cursor:"pointer"}}>➤</button>
            </div>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
