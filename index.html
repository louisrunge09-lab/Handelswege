<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Handelswege</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; font-family: system-ui, sans-serif; }
    input, button { font-family: inherit; }

    @keyframes twinkle {
      0%,100% { opacity:0.15; transform:scale(0.8); }
      50% { opacity:1; transform:scale(1.5); }
    }
    @keyframes float-up {
      0% { opacity:1; transform:translateY(0) scale(1); }
      100% { opacity:0; transform:translateY(-60px) scale(1.3); }
    }
    @keyframes slide-down {
      from { opacity:0; transform:translateY(-12px); }
      to { opacity:1; transform:translateY(0); }
    }
    @keyframes bounce-in {
      0% { transform:scale(0.85); opacity:0; }
      60% { transform:scale(1.04); }
      100% { transform:scale(1); opacity:1; }
    }
    @keyframes glow-pulse {
      0%,100% { box-shadow:0 0 10px rgba(42,157,143,0.3); }
      50% { box-shadow:0 0 28px rgba(42,157,143,0.8),0 0 50px rgba(42,157,143,0.2); }
    }
    @keyframes raid-shake {
      0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}
    }
    @keyframes gradient-shift {
      0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
    }
    @keyframes spin-slow {
      from{transform:rotate(0deg)} to{transform:rotate(360deg)}
    }

    .btn-primary {
      transition: all 0.18s cubic-bezier(0.4,0,0.2,1) !important;
    }
    .btn-primary:hover {
      transform: translateY(-3px) !important;
      filter: brightness(1.18);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
    }
    .btn-primary:active { transform: scale(0.97) !important; }

    .btn-ready { animation: glow-pulse 2s ease-in-out infinite; }

    .build-card { transition: all 0.15s ease !important; }
    .build-card:hover {
      transform: translateY(-3px) scale(1.02) !important;
      box-shadow: 0 6px 20px rgba(244,162,97,0.25) !important;
      border-color: rgba(244,162,97,0.6) !important;
      z-index: 10;
    }

    .res-card { transition: all 0.18s ease !important; cursor: default; }
    .res-card:hover {
      transform: translateY(-4px) scale(1.06) !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
    }

    .action-btn { transition: all 0.15s ease !important; }
    .action-btn:hover { filter: brightness(1.25); transform: translateY(-2px) !important; }
    .action-btn:active { transform: scale(0.95) !important; }

    .panel-slide { animation: slide-down 0.22s ease; }
    .bounce-in { animation: bounce-in 0.35s cubic-bezier(0.4,0,0.2,1); }
    .shake { animation: raid-shake 0.4s ease; }

    @keyframes shoot {
      0%   { transform:translateX(0) translateY(0) rotate(-32deg); opacity:1; }
      80%  { opacity:0.6; }
      100% { transform:translateX(480px) translateY(200px) rotate(-32deg); opacity:0; }
    }
    @keyframes fade-up-in {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes nebula-drift {
      0%,100% { opacity:0.05; transform:scale(1); }
      50%     { opacity:0.1;  transform:scale(1.1); }
    }
    @keyframes home-float {
      0%,100% { transform:translateY(0); }
      50%     { transform:translateY(-5px); }
    }

    .hero-l1 { animation:fade-up-in 0.65s ease both; }
    .hero-l2 { animation:fade-up-in 0.65s 0.12s ease both; }
    .hero-l3 { animation:fade-up-in 0.65s 0.24s ease both; }
    .home-sect { animation:fade-up-in 0.55s 0.3s ease both; }

    .home-card {
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), box-shadow 0.25s ease !important;
    }
    .home-card:hover {
      transform: translateY(-5px) !important;
      box-shadow: 0 14px 44px rgba(0,0,0,0.55) !important;
    }

    .cta-orange {
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1) !important;
      box-shadow: 0 4px 20px rgba(244,162,97,0.4) !important;
    }
    .cta-orange:hover {
      transform: translateY(-3px) scale(1.025) !important;
      box-shadow: 0 10px 36px rgba(244,162,97,0.6), 0 0 50px rgba(244,162,97,0.12) !important;
      filter: brightness(1.07);
    }
    .cta-orange:active { transform: scale(0.97) !important; }

    .cta-purple {
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1) !important;
      box-shadow: 0 4px 20px rgba(155,89,182,0.4) !important;
    }
    .cta-purple:hover {
      transform: translateY(-3px) scale(1.025) !important;
      box-shadow: 0 10px 36px rgba(155,89,182,0.55) !important;
      filter: brightness(1.08);
    }
    .cta-purple:active { transform: scale(0.97) !important; }

    .cta-blue {
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1) !important;
      box-shadow: 0 4px 16px rgba(69,123,157,0.4) !important;
    }
    .cta-blue:hover {
      transform: translateY(-3px) scale(1.025) !important;
      box-shadow: 0 10px 32px rgba(69,123,157,0.55) !important;
      filter: brightness(1.08);
    }
    .cta-blue:active { transform: scale(0.97) !important; }

    .mode-btn {
      transition: all 0.15s ease !important;
      position: relative;
    }
    .mode-btn:hover { transform:translateY(-2px) !important; filter:brightness(1.15); }
    .mode-btn:active { transform:scale(0.96) !important; }

    .home-input:focus {
      border-color: rgba(155,89,182,0.7) !important;
      box-shadow: 0 0 0 3px rgba(155,89,182,0.15) !important;
    }
    .code-input:focus {
      border-color: rgba(69,123,157,0.8) !important;
      box-shadow: 0 0 0 3px rgba(69,123,157,0.18) !important;
    }

    .version-badge {
      position: fixed;
      top: 14px; right: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 4px 10px;
      color: #3a4060;
      font-size: 11px;
      letter-spacing: 0.5px;
      z-index: 10;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .home-title { font-size: 34px !important; }
      .home-sub1  { font-size: 13px !important; }
    }

    /* ── GAME SCREEN ─────────────────────────────────────────────────────── */
    @keyframes ready-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(42,157,143,0); }
      50%     { box-shadow: 0 0 14px 3px rgba(42,157,143,0.35); }
    }
    @keyframes all-ready-gold {
      0%,100% { box-shadow: 0 0 14px rgba(233,196,106,0.5), 0 4px 20px rgba(244,162,97,0.3); }
      50%     { box-shadow: 0 0 32px rgba(233,196,106,0.8), 0 4px 30px rgba(244,162,97,0.5); }
    }
    @keyframes count-pop {
      0%   { transform:scale(1); }
      40%  { transform:scale(1.22); }
      100% { transform:scale(1); }
    }

    .player-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .player-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    .player-card-me { animation: ready-pulse 2.5s ease-in-out infinite; }

    .action-tab {
      transition: all 0.15s cubic-bezier(0.4,0,0.2,1) !important;
    }
    .action-tab:hover { filter:brightness(1.25); transform:translateY(-3px) !important; }
    .action-tab:active { transform:scale(0.93) !important; }

    .ready-btn {
      transition: all 0.2s ease !important;
      animation: glow-pulse 2s ease-in-out infinite;
    }
    .ready-btn:hover { filter:brightness(1.1); transform:translateY(-2px) !important; }
    .all-ready-btn {
      animation: all-ready-gold 1.1s ease-in-out infinite !important;
      border-color: #e9c46a !important;
    }
    .done-btn { opacity:0.7; }

    .log-msg { animation: fade-up-in 0.3s ease both; }
    .chat-msg { animation: fade-up-in 0.25s ease both; }
    .sys-msg  { animation: fade-up-in 0.25s ease both; }

    .res-card:hover .res-inc { color: #3ab8a8 !important; }

    .game-section {
      background: #1c2030;
      border: 1px solid #252b3d;
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .section-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 10px;
      color: #3a4060;
    }

    .gradient-title {
      background: linear-gradient(135deg,#f4a261,#e76f51,#9b59b6,#457b9d);
      background-size: 300% 300%;
      animation: gradient-shift 4s ease infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .floater {
      position: fixed;
      pointer-events: none;
      font-weight: 900;
      font-size: 18px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      animation: float-up 1.4s ease forwards;
      z-index: 999;
    }
    .vp-bar-fill {
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #2e3448; border-radius: 4px; }
    img.emoji { height:1.1em; width:1.1em; vertical-align:-0.15em; display:inline-block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SUPABASE_URL = "https://rejrcuapcendtviezvfc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlanJjdWFwY2VuZHR2aWV6dmZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNjQwNzcsImV4cCI6MjA5Nzg0MDA3N30.ru33fqL5plRCZRwzEe8qQTJ25Bv3MstXt-wi5Y2IqI0";

    const VERSION = "v2.2";
    const PLAYER_COLORS = ["#f4a261","#457b9d","#2a9d8f","#e76f51","#9b59b6","#e9c46a","#f72585","#4cc9f0","#06d6a0","#ff6b35"];
    const RESOURCES = ["Holz", "Stein", "Getreide", "Gold"];
    const RES_ICONS = { Holz: "🪵", Stein: "🪨", Getreide: "🌾", Gold: "🪙" };
    const MODES = {
      schnell: { label: "⚡ Schnell", winVP: 30,  resMulti: 1.8, incMulti: 1.6, costMulti: 0.75, desc: "30 VP · Mehr Ressourcen" },
      normal:  { label: "🏆 Normal",  winVP: 50,  resMulti: 1.0, incMulti: 1.0, costMulti: 1.0,  desc: "50 VP · Standard" },

    };
    function getWinVP(gs) { return (MODES[gs?.gameMode] || MODES.normal).winVP; }
    function getMode(gs) { return MODES[gs?.gameMode] || MODES.normal; }

    const BUILDINGS = [
      { id: "farm", name: "Farm", icon: "🏡", levels: [
        { cost: { Holz: 3, Getreide: 2 }, income: { Getreide: 2 }, vp: 1, desc: "+2 Getreide/Rd" },
        { cost: { Holz: 7, Getreide: 5, Gold: 4 }, income: { Getreide: 4 }, vp: 2, desc: "+4 Getreide/Rd" },
        { cost: { Holz: 12, Getreide: 9, Gold: 8 }, income: { Getreide: 7 }, vp: 3, desc: "+7 Getreide/Rd" },
      ]},
      { id: "sawmill", name: "Sägewerk", icon: "🪚", levels: [
        { cost: { Stein: 3, Gold: 2 }, income: { Holz: 3 }, vp: 1, desc: "+3 Holz/Rd" },
        { cost: { Stein: 7, Gold: 5 }, income: { Holz: 5 }, vp: 2, desc: "+5 Holz/Rd" },

      ]},
      { id: "mine", name: "Mine", icon: "⛏️", levels: [
        { cost: { Holz: 1, Stein: 1 }, income: { Stein: 2, Gold: 1 }, vp: 1, desc: "+2 Stein +1 Gold/Rd" },
        { cost: { Holz: 5, Stein: 7, Gold: 4 }, income: { Stein: 3, Gold: 2 }, vp: 2, desc: "+3 Stein +2 Gold/Rd" },
        { cost: { Holz: 8, Stein: 11, Gold: 7 }, income: { Stein: 5, Gold: 3 }, vp: 3, desc: "+5 Stein +3 Gold/Rd" },
      ]},
      { id: "markt", name: "Markt", icon: "🏪", levels: [
        { cost: { Holz: 3, Gold: 2 }, income: { Gold: 2 }, vp: 2, desc: "+2 Gold/Rd" },
        { cost: { Holz: 7, Gold: 6 }, income: { Gold: 3 }, vp: 3, desc: "+3 Gold/Rd" },
        { cost: { Holz: 11, Getreide: 7, Gold: 10 }, income: { Gold: 5 }, vp: 4, desc: "+5 Gold/Rd" },
      ]},
      { id: "hafen", name: "Hafen", icon: "⚓", levels: [
        { cost: { Holz: 4, Gold: 3 }, income: { Gold: 1 }, vp: 3, desc: "+1 Gold/Rd, Bank 2:1" },
        { cost: { Holz: 8, Gold: 7 }, income: { Gold: 2 }, vp: 4, desc: "+2 Gold/Rd, Bank 2:1" },
        { cost: { Holz: 13, Gold: 11 }, income: { Gold: 3 }, vp: 5, desc: "+3 Gold/Rd, Bank 2:1" },
      ]},
      { id: "tempel", name: "Tempel", icon: "⛩️", levels: [
        { cost: { Stein: 4, Getreide: 3 }, income: {}, vp: 5, desc: "+5 VP" },
        { cost: { Stein: 9, Gold: 6, Getreide: 7 }, income: {}, vp: 8, desc: "+8 VP" },
        { cost: { Stein: 14, Gold: 11, Getreide: 11 }, income: {}, vp: 12, desc: "+12 VP" },
      ]},
      { id: "uni", name: "Universität", icon: "🎓", levels: [
        { cost: { Gold: 3, Getreide: 4 }, income: {}, vp: 5, desc: "+5 VP, +1 alle/Rd" },
        { cost: { Gold: 8, Getreide: 8, Stein: 5 }, income: {}, vp: 7, desc: "+7 VP, +2 alle/Rd" },
        { cost: { Gold: 13, Getreide: 13, Stein: 9 }, income: {}, vp: 10, desc: "+10 VP, +3 alle/Rd" },
      ]},
      { id: "burg", name: "Burg", icon: "🏰", levels: [
        { cost: { Stein: 4, Getreide: 3 }, income: {}, vp: 6, desc: "+6 VP" },
        { cost: { Stein: 9, Gold: 7, Getreide: 6 }, income: {}, vp: 9, desc: "+9 VP" },
        { cost: { Stein: 14, Gold: 11, Getreide: 9 }, income: {}, vp: 13, desc: "+13 VP" },
      ]},
    ];

    // Gebäude-Voraussetzungen
    const BUILDING_REQS = {
      markt:  { requiresAny: [{id:"farm",level:1},{id:"sawmill",level:1}] },
      hafen:  { requires: [{id:"markt",level:1}] },
      tempel: { requires: [{id:"mine",level:1}] },
      uni:    { requires: [{id:"markt",level:1}] },
      burg:   { requires: [{id:"tempel",level:1}] },
    };
    function meetsReqs(player, bid) {
      const req = BUILDING_REQS[bid];
      if (!req) return true;
      const b = player.buildings || {};
      if (req.requires && req.requires.some(r => (b[r.id]||0) < r.level)) return false;
      if (req.requiresAny && !req.requiresAny.some(r => (b[r.id]||0) >= r.level)) return false;
      return true;
    }
    function reqLabel(bid) {
      const req = BUILDING_REQS[bid];
      if (!req) return null;
      const name = id => { const b = BUILDINGS.find(x=>x.id===id); return b ? b.icon+" "+b.name : id; };
      if (req.requires) return "Braucht: "+req.requires.map(r=>name(r.id)+" Lv"+r.level).join(" + ");
      if (req.requiresAny) return "Braucht: "+req.requiresAny.map(r=>name(r.id)).join(" oder ");
      return null;
    }

    // Mehrfach-Bauen: Kostenmultiplikator pro zusätzlichem Gebäude in dieser Runde
    const BUILD_MULTI_MULT = [1, 1.6, 2.3]; // 1. Bau normal, 2. Bau teurer, 3. Bau am teuersten
    const MAX_BUILDS_PER_ROUND = 3;
    function scaleCost(cost, mult) {
      const out = {};
      for (const [r, v] of Object.entries(cost)) out[r] = Math.ceil(v * mult);
      return out;
    }

    // Finanzamt-Schwelle: ab diesem Gesamtvermögen kann das Finanzamt zuschlagen
    const FINANZAMT_MIN_VERMOEGEN = 15;

    // Räuber — kein VP, aber klaut beim Rundenende
    const RAEUBER_LEVELS = [
      { cost: { Gold: 2 }, steal: 1, desc: "Klaut 1 zufällige Res." },
      { cost: { Gold: 3 }, steal: 2, desc: "Klaut 2 zufällige Res." },
      { cost: { Gold: 4 }, steal: 3, desc: "Klaut 3 zufällige Res." },
    ];

    // Sabotage-Kosten in Gold je nach Gebäudestufe
    const SABOTAGE_COST = { 1: 5, 2: 9, 3: 14 };

    // Technologiekarten — einmalige Effekte, pro Runde kaufbar
    const TECH_CARDS = [
      { id:"doppel",   label:"⚡ Doppeleinkommen", desc:"Diese Runde 2× Einkommen",       cost:{Gold:4} },
      { id:"steuer",   label:"🛡️ Steuerberater",  desc:"Finanzamt überspringt dich",      cost:{Gold:5} },
      { id:"haendler", label:"🔄 Händler",         desc:"Alle Bank-Tausche 2:1 diese Runde",cost:{Gold:3} },
      { id:"bauboom",  label:"🏗️ Bauboom",         desc:"+1 Bauplatz diese Runde (max 4)", cost:{Gold:5} },
      { id:"ernte2",   label:"🌾 Sonderernte",     desc:"Sofort +5 Getreide",              cost:{Gold:2} },
      { id:"schatz",   label:"🪙 Schatzsuche",     desc:"Sofort +4 Gold",                 cost:{Stein:3,Holz:3} },
    ];

    // Ereigniskarten — jede Runde 40% Chance auf ein Ereignis
    const EVENTS = [
      { id:"durre",      label:"🌵 Dürre",       desc:"Alle verlieren 2 Getreide",       apply:(ps)=>ps.map(p=>({...p,resources:{...p.resources,Getreide:Math.max(0,(p.resources.Getreide||0)-2)}})) },
      { id:"goldfieber", label:"⛏️ Goldrausch",  desc:"Mine-Besitzer bekommen +4 Gold",  apply:(ps)=>ps.map(p=>(p.buildings.mine||0)>0?{...p,resources:{...p.resources,Gold:(p.resources.Gold||0)+4}}:p) },
      { id:"marktboom",  label:"📈 Marktboom",   desc:"Markt-Besitzer bekommen +3 Gold", apply:(ps)=>ps.map(p=>(p.buildings.markt||0)>0?{...p,resources:{...p.resources,Gold:(p.resources.Gold||0)+3}}:p) },
      { id:"ernte",      label:"🌾 Ernte",        desc:"Alle bekommen +3 Getreide",       apply:(ps)=>ps.map(p=>({...p,resources:{...p.resources,Getreide:(p.resources.Getreide||0)+3}})) },
      { id:"sturm",      label:"🌪️ Sturm",       desc:"Alle verlieren 2 Holz",           apply:(ps)=>ps.map(p=>({...p,resources:{...p.resources,Holz:Math.max(0,(p.resources.Holz||0)-2)}})) },
      { id:"steuergnade",label:"🎁 Steuergnade", desc:"Alle bekommen +2 Gold",           apply:(ps)=>ps.map(p=>({...p,resources:{...p.resources,Gold:(p.resources.Gold||0)+2}})) },
      { id:"frieden",    label:"🕊️ Frieden",     desc:"Kein Finanzamt diese Runde",      skipFinanzamt:true, apply:(ps)=>ps },
      { id:"burg_bonus", label:"🏰 Burgfest",    desc:"Burg-Besitzer bekommen +3 Gold",  apply:(ps)=>ps.map(p=>(p.buildings.burg||0)>0?{...p,resources:{...p.resources,Gold:(p.resources.Gold||0)+3}}:p) },
    ];

    // Bank trades
    const BANK_TRADES = [
      // Res → Gold
      { give: "Holz",     amt: 3, get: "Gold",     label: "3🪵→1🪙" },
      { give: "Getreide", amt: 4, get: "Gold",     label: "4🌾→1🪙" },
      { give: "Stein",    amt: 4, get: "Gold",     label: "4🪨→1🪙" },
      // Gold → alles (2:1)
      { give: "Gold",     amt: 2, get: "Holz",    label: "2🪙→1🪵" },
      { give: "Gold",     amt: 2, get: "Stein",   label: "2🪙→1🪨" },
      { give: "Gold",     amt: 2, get: "Getreide",label: "2🪙→1🌾" },
    ];
    const BANK_RATES = { Holz: 3, Stein: 4, Getreide: 4 };

    // ── HELPERS ──────────────────────────────────────────────────────────────
    function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function randomResources(idx, gameMode) {
      idx = idx || 0;
      const m = (MODES[gameMode] || MODES.normal).resMulti;
      const off = [
        { Holz: 0, Stein: 0, Getreide: 0 },
        { Holz: 1, Stein: -1, Getreide: 1 },
        { Holz: -1, Stein: 1, Getreide: -1 },
        { Holz: 1, Stein: 0, Getreide: 1 },
      ];
      const o = off[idx] || off[0];
      return {
        Holz:     Math.max(1, Math.round((rnd(1,2)+o.Holz) * m)),
        Stein:    Math.max(0, Math.round((rnd(0,2)+o.Stein) * m)),
        Getreide: Math.max(1, Math.round((rnd(1,2)+o.Getreide) * m)),
        Gold: 0,
      };
    }

    function calcIncome(player, gameMode) {
      const multi = (MODES[gameMode] || MODES.normal).incMulti;
      const inc = { Holz: 1, Stein: 0, Getreide: 1, Gold: 0 };
      for (const [bid, lvl] of Object.entries(player.buildings)) {
        const b = BUILDINGS.find(x => x.id === bid);
        if (!b) continue;
        const bd = b.levels[lvl-1];
        for (const [r,v] of Object.entries(bd.income)) inc[r] = (inc[r]||0) + v;
        if (bid === "uni") for (const r of RESOURCES) inc[r] = (inc[r]||0) + lvl;
      }
      if (multi !== 1) for (const r of RESOURCES) inc[r] = Math.max(0, Math.round((inc[r]||0) * multi));
      return inc;
    }

    function calcVP(player) {
      let t = 0;
      for (const [bid, lvl] of Object.entries(player.buildings)) {
        const b = BUILDINGS.find(x => x.id === bid);
        if (b) t += b.levels[lvl-1].vp;
      }
      return t;
    }

    function canAfford(res, cost) {
      return Object.entries(cost).every(([r,v]) => (res[r]||0) >= v);
    }

    function deduct(res, cost) {
      const r = {...res};
      for (const [k,v] of Object.entries(cost)) r[k] = (r[k]||0) - v;
      return r;
    }

    function applyIncome(player, gameMode) {
      const inc = calcIncome(player, gameMode);
      const res = {...player.resources};
      for (const [r,v] of Object.entries(inc)) res[r] = (res[r]||0) + v;
      return {...player, resources: res};
    }

    function incSummary(player, gameMode) {
      const inc = calcIncome(player, gameMode);
      return Object.entries(inc).filter(([,v])=>v>0).map(([r,v])=>"+"+v+RES_ICONS[r]).join(" ");
    }

    function makeSB() {
      const h = {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=representation",
      };
      return {
        async getRoom(id) {
          const r = await fetch(SUPABASE_URL+"/rest/v1/game_rooms?id=eq."+id+"&select=*", {headers:h});
          const d = await r.json(); return d[0]||null;
        },
        async createRoom(id, state) {
          await fetch(SUPABASE_URL+"/rest/v1/game_rooms", {method:"POST",headers:h,body:JSON.stringify({id,state})});
        },
        async updateRoom(id, state) {
          await fetch(SUPABASE_URL+"/rest/v1/game_rooms?id=eq."+id, {method:"PATCH",headers:h,body:JSON.stringify({state})});
        },
        subscribe(id, cb) {
          let lastJson = "";
          const poll = setInterval(async () => {
            try {
              const r = await fetch(SUPABASE_URL+"/rest/v1/game_rooms?id=eq."+id+"&select=state", {headers:h});
              if (!r.ok) return;
              const d = await r.json();
              if (d[0]) {
                const j = JSON.stringify(d[0].state);
                if (j !== lastJson) { lastJson = j; cb(d[0].state); }
              }
            } catch(e) {}
          }, 1500);
          return () => clearInterval(poll);
        },
      };
    }

    // ── KI ───────────────────────────────────────────────────────────────
    function runAI(gs, aiIdx) {
      const mode = getMode(gs);
      const winVP = getWinVP(gs);
      const currentVP = calcVP(gs.players[aiIdx]);
      const gameProgress = Math.min(1, currentVP / winVP);
      let p = { ...gs.players[aiIdx], resources: {...gs.players[aiIdx].resources}, buildings: {...gs.players[aiIdx].buildings}, activeTechs: [] };

      // 1. Bank-Tausch: Überschuss in Gold umwandeln
      const hasHafen = (p.buildings["hafen"] || 0) > 0;
      for (let t = 0; t < 8; t++) {
        let traded = false;
        for (const trade of BANK_TRADES.filter(x => x.get === "Gold")) {
          const rate = hasHafen ? 2 : trade.amt;
          if ((p.resources[trade.give] || 0) >= rate + 2) {
            p.resources[trade.give] -= rate;
            p.resources["Gold"] = (p.resources["Gold"] || 0) + 1;
            traded = true; break;
          }
        }
        if (!traded) break;
      }

      // 2. Tech-Karten kaufen
      const totalRes = RESOURCES.reduce((s,r)=>(s+(p.resources[r]||0)),0);
      const incomeBuildings = ["farm","sawmill","mine","markt","hafen"].filter(id=>(p.buildings[id]||0)>0).length;
      if (!p.activeTechs.includes("steuer") && totalRes >= 20 && (p.resources.Gold||0) >= 5) {
        const tc = TECH_CARDS.find(t=>t.id==="steuer");
        if (canAfford(p.resources, tc.cost)) { p.resources = deduct(p.resources, tc.cost); p.activeTechs.push("steuer"); }
      }
      if (!p.activeTechs.includes("doppel") && incomeBuildings >= 2 && (p.resources.Gold||0) >= 5) {
        const tc = TECH_CARDS.find(t=>t.id==="doppel");
        if (canAfford(p.resources, tc.cost)) { p.resources = deduct(p.resources, tc.cost); p.activeTechs.push("doppel"); }
      }

      // 3. Bauen — score gewichtet nach Spielphase
      const pending = [];
      for (let attempt = 0; attempt < MAX_BUILDS_PER_ROUND; attempt++) {
        let best = null, bestScore = -1;
        for (const b of BUILDINGS) {
          const plannedForThis = pending.filter(pb => pb.bid === b.id).length;
          const cur = (p.buildings[b.id] || 0) + plannedForThis;
          if (cur >= 3) continue;
          if (!meetsReqs(p, b.id)) continue;
          const bd = b.levels[cur];
          const mult = BUILD_MULTI_MULT[pending.length] || BUILD_MULTI_MULT[BUILD_MULTI_MULT.length-1];
          const cost = scaleCost(bd.cost, mult * mode.costMulti);
          if (!canAfford(p.resources, cost)) continue;
          const incVal = Object.values(bd.income).reduce((s,v)=>s+v, 0);
          const costVal = Math.max(1, Object.values(cost).reduce((s,v)=>s+v, 0));
          // Früh: Income wichtiger; Spät: VP wichtiger
          const vpWeight = 2 + gameProgress * 3;
          const incWeight = 3 - gameProgress * 2;
          const score = (bd.vp * vpWeight + incVal * incWeight) / costVal;
          if (score > bestScore) { bestScore = score; best = { b, cur, cost }; }
        }
        if (!best) break;
        p.resources = deduct(p.resources, best.cost);
        pending.push({ bid: best.b.id, level: best.cur+1, cost: best.cost });
      }
      p.pendingBuilds = pending;

      // 4. Raid — reichsten nicht-allierten Spieler angreifen
      if (!p.pendingRaeuber) {
        const allies = (gs.alliances||[]).filter(a=>(a.a===aiIdx||a.b===aiIdx)&&a.endsAfter>gs.round);
        const targets = gs.players.map((pl,i)=>{
          if (i===aiIdx) return null;
          if (allies.find(a=>a.a===i||a.b===i)) return null;
          const res = RESOURCES.reduce((s,r)=>(s+(pl.resources[r]||0)),0);
          return {i, res};
        }).filter(Boolean).sort((a,b)=>b.res-a.res);
        if (targets.length > 0) {
          const tgt = targets[0];
          const raidChance = Math.min(0.7, 0.15 + tgt.res / 60);
          if (tgt.res >= 5 && Math.random() < raidChance) {
            for (let lvl = RAEUBER_LEVELS.length; lvl >= 1; lvl--) {
              if (canAfford(p.resources, RAEUBER_LEVELS[lvl-1].cost)) {
                p.resources = deduct(p.resources, RAEUBER_LEVELS[lvl-1].cost);
                p.pendingRaeuber = {target: tgt.i, level: lvl};
                break;
              }
            }
          }
        }
      }

      p.ready = true;
      return p;
    }

      const [myName, setMyName] = useState("");
      const [roomCode, setRoomCode] = useState("");
      const [joinCode, setJoinCode] = useState("");
      const [myIndex, setMyIndex] = useState(null);
      const [isHost, setIsHost] = useState(false);
      const [gs, setGs] = useState(null);
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);
      const [feedback, setFeedback] = useState("");
      const [isSolo, setIsSolo] = useState(false);
      const [soloMode, setSoloMode] = useState("normal");
      const [numAI, setNumAI] = useState(1);
      const [timerSec, setTimerSec] = useState(null);
      const timerRef = useRef(null);
      const [showTutorial, setShowTutorial] = useState(() => !localStorage.getItem("hwt"));
      const [floaters, setFloaters] = useState([]);
      const prevResRef = useRef(null);

      // Local UI
      const [panel, setPanel] = useState(null);
      const [bankRes, setBankRes] = useState(null);
      const [bankAmt, setBankAmt] = useState(3);
      const [ptTarget, setPtTarget] = useState(null);
      const [ptOffer, setPtOffer] = useState({Holz:0,Stein:0,Getreide:0,Gold:0});
      const [ptWant, setPtWant]   = useState({Holz:0,Stein:0,Getreide:0,Gold:0});
      const [chatMsg, setChatMsg] = useState("");
      const [chatTarget, setChatTarget] = useState(null); // null = an alle, idx = privat an Spieler
      const [menuOpen, setMenuOpen] = useState(false);
      const [raidAlert, setRaidAlert] = useState(null);
      const [roundSummary, setRoundSummary] = useState(null);
      const [isSpectator, setIsSpectator] = useState(false);
      const [isMobile, setIsMobile] = useState(() => window.innerWidth < 700);
      const [chatOpen, setChatOpen] = useState(false);
      const [raidTab, setRaidTab] = useState("raid"); // "raid" | "sabotage"
      const chatEndRef = useRef(null);

      const sb = useRef(makeSB());
      const codeRef = useRef(null);
      const unsubRef = useRef(null);

      // Session restore
      useEffect(() => {
        const saved = localStorage.getItem("handelswege_session");
        if (saved) {
          try {
            const {code, idx, name} = JSON.parse(saved);
            sb.current.getRoom(code).then(room => {
              if (!room || !room.state) {
                localStorage.removeItem("handelswege_session");
                return;
              }
              const state = room.state;
              // Find player by name in case index shifted (e.g. someone was kicked)
              const foundIdx = state.players ? state.players.findIndex(p => p.name === name) : -1;
              if (foundIdx === -1) {
                localStorage.removeItem("handelswege_session");
                return;
              }
              codeRef.current = code;
              setRoomCode(code);
              setMyIndex(foundIdx);
              setMyName(name);
              setIsHost(foundIdx === 0);
              setGs(state);
              if (state.phase === "lobby") setScreen("lobby");
              else if (state.phase === "playing" || state.phase === "finished") setScreen("game");
              subscribe(code);
              // Update saved index in case it changed
              saveSession(code, foundIdx, name);
            });
          } catch(e) { localStorage.removeItem("handelswege_session"); }
        }
      }, []);

      // Auto-switch lobby→game
      useEffect(() => {
        if (screen === "lobby" && gs && gs.phase === "playing") setScreen("game");
      }, [gs && gs.phase]);

      // Keep myIndex in sync with myName whenever players list changes
      useEffect(() => {
        if (!gs || !gs.players || !myName) return;
        const idx = gs.players.findIndex(p => p.name === myName);
        if (idx === -1) {
          // We got kicked — go back to home
          clearSession();
          setScreen("home"); setGs(null); setMyIndex(null); setIsHost(false); setRoomCode("");
          return;
        }
        if (idx !== myIndex) {
          setMyIndex(idx);
          setIsHost(idx === 0);
          if (codeRef.current) saveSession(codeRef.current, idx, myName);
        }
      }, [gs && gs.players && gs.players.map(p=>p.name).join(",")]);

      // Twemoji: nach jedem Render Emojis als SVG rendern
      useEffect(() => {
        if (typeof twemoji !== "undefined") {
          twemoji.parse(document.getElementById("root"), { folder:"svg", ext:".svg" });
        }
      });

      // Auto-scroll chat
      useEffect(() => {
        if (chatEndRef.current) chatEndRef.current.scrollIntoView({behavior:"smooth"});
      }, [gs && gs.chat && gs.chat.length]);

      // Show raid alert popup when log contains attack on me
      useEffect(() => {
        if (!gs || !gs.log || !myName) return;
        const latest = gs.log[0];
        if (!latest) return;
        const isMyRaid = latest.includes(myName+"!") && (latest.includes("🗡️") || latest.includes("🏛️"));
        if (isMyRaid) {
          setRaidAlert({msg: latest, type: latest.startsWith("🏛️") ? "bandit" : "raid"});
          setTimeout(() => setRaidAlert(null), 5000);
        }
      }, [gs && gs.log && gs.log[0]]);

      // Floating numbers when my resources change
      useEffect(() => {
        if (!me) { prevResRef.current = null; return; }
        const prev = prevResRef.current;
        prevResRef.current = me.resources;
        if (!prev) return;
        const newF = [];
        for (const r of RESOURCES) {
          const diff = (me.resources[r]||0) - (prev[r]||0);
          if (diff === 0) continue;
          newF.push({
            id: Date.now()+r, text: (diff>0?"+":"")+diff+RES_ICONS[r],
            color: diff>0?"#2a9d8f":"#e76f51",
            x: 20+Math.random()*60, y: 30+Math.random()*40,
          });
        }
        if (newF.length) {
          setFloaters(f => [...f, ...newF]);
          setTimeout(() => setFloaters(f => f.filter(x => !newF.find(n=>n.id===x.id))), 1500);
        }
      }, [me && JSON.stringify(me.resources)]);

      // Show toast when a new round begins
      const lastRoundRef = useRef(null);
      const [roundToast, setRoundToast] = useState(null);
      useEffect(() => {
        if (!gs || gs.phase !== "playing") return;
        if (lastRoundRef.current === null) { lastRoundRef.current = gs.round; return; }
        if (gs.round !== lastRoundRef.current) {
          lastRoundRef.current = gs.round;
          setRoundToast("🔔 Runde "+gs.round+" beginnt!");
          setTimeout(() => setRoundToast(null), 3500);
        }
      }, [gs && gs.round]);

      // Mobile detection
      useEffect(() => {
        const h = () => setIsMobile(window.innerWidth < 700);
        window.addEventListener("resize", h);
        return () => window.removeEventListener("resize", h);
      }, []);

      // Timer countdown — auto-ready wenn timeLimit aktiv
      useEffect(() => {
        if (!gs || gs.phase !== "playing" || !gs.timeLimit || !me || me.ready) {
          setTimerSec(null);
          if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
          return;
        }
        if (timerRef.current) clearInterval(timerRef.current);
        setTimerSec(gs.timeLimit);
        timerRef.current = setInterval(() => {
          setTimerSec(s => {
            if (s <= 1) {
              clearInterval(timerRef.current); timerRef.current = null;
              markReady();
              return null;
            }
            return s - 1;
          });
        }, 1000);
        return () => { if (timerRef.current) clearInterval(timerRef.current); };
      }, [gs && gs.round, me && me.ready]);

      function subscribe(code) {
        if (unsubRef.current) unsubRef.current();
        unsubRef.current = sb.current.subscribe(code, newState => setGs(newState));
      }

      function saveSession(code, idx, name) { localStorage.setItem("handelswege_session", JSON.stringify({code,idx,name})); }
      function clearSession() { localStorage.removeItem("handelswege_session"); }

      async function push(newGs) {
        setGs(newGs);
        if (!isSolo) await sb.current.updateRoom(codeRef.current, newGs);
      }

      async function startSolo() {
        if (!myName.trim()) { setError("Bitte Namen eingeben"); return; }
        const players = [
          { name: myName.trim(), color: PLAYER_COLORS[0] },
          ...Array.from({length:numAI}, (_,i) => ({ name: "KI "+(numAI>1?i+1:"")+" 🤖".trim(), color: PLAYER_COLORS[i+1] })),
        ];
        const state = initGameState(players, soloMode);
        setIsSolo(true); setMyIndex(0); setIsHost(true); setGs(state); setScreen("game");
      }

      function addLog(g, msg) { return {...g, log:[msg,...(g.log||[])].slice(0,60)}; }
      function resetTrade() { setPtTarget(null); setPtOffer({Holz:0,Stein:0,Getreide:0,Gold:0}); setPtWant({Holz:0,Stein:0,Getreide:0,Gold:0}); }

      // ── LOBBY ──────────────────────────────────────────────────────────────
      async function createRoom() {
        if (!myName.trim()) { setError("Bitte Namen eingeben"); setFeedback(""); return; }
        if (loading) return; // prevent double-tap
        setLoading(true); setError(""); setFeedback("Raum wird erstellt…");
        try {
          const code = generateRoomCode();
          const lobby = { phase:"lobby", gameMode:"schnell", players:[{name:myName.trim(), color:PLAYER_COLORS[0]}], log:[], chat:[], tradeOffers:[], winner:null };
          await sb.current.createRoom(code, lobby);
          codeRef.current = code;
          setRoomCode(code); setMyIndex(0); setIsHost(true); setGs(lobby);
          saveSession(code, 0, myName.trim());
          setFeedback("✅ Raum erstellt! Code: "+code);
          subscribe(code); setScreen("lobby");
        } catch(e) {
          setError("Fehler beim Erstellen. Bitte nochmal versuchen.");
          setFeedback("");
        }
        setLoading(false);
      }

      async function joinRoom() {
        if (!myName.trim()) { setError("Bitte Namen eingeben"); setFeedback(""); return; }
        if (!joinCode.trim()) { setError("Bitte Raum-Code eingeben"); setFeedback(""); return; }
        if (joinCode.trim().length !== 4) { setError("Code muss 4 Zeichen lang sein"); return; }
        setLoading(true); setError(""); setFeedback("Suche Raum "+joinCode.trim().toUpperCase()+"…");
        try {
          const code = joinCode.trim().toUpperCase();
          const room = await sb.current.getRoom(code);
          if (!room) { setError("❌ Raum " + code + " nicht gefunden"); setFeedback(""); setLoading(false); return; }
          if (room.state.phase === "playing") {
            codeRef.current = code; setRoomCode(code); setMyIndex(null); setIsHost(false);
            setGs(room.state); setIsSpectator(true); subscribe(code); setScreen("game");
            setFeedback(""); setLoading(false); return;
          }
          if (room.state.phase === "finished") { setError("⏳ Spiel in Raum " + code + " ist bereits beendet"); setFeedback(""); setLoading(false); return; }
          if (room.state.players.length >= 10) { setError("🚫 Raum " + code + " ist voll (10/10)"); setFeedback(""); setLoading(false); return; }
          const idx = room.state.players.length;
          const newPs = [...room.state.players, {name:myName.trim(), color:PLAYER_COLORS[idx]}];
          const newGs = {...room.state, players:newPs};
          codeRef.current = code;
          setRoomCode(code); setMyIndex(idx); setIsHost(false);
          await sb.current.updateRoom(code, newGs);
          saveSession(code, idx, myName.trim());
          setFeedback("✅ Beigetreten! "+room.state.players.map(p=>p.name).join(", ")+" sind schon drin.");
          setGs(newGs); subscribe(code); setScreen("lobby");
        } catch(e) {
          setError("Verbindungsfehler. Bitte nochmal versuchen.");
          setFeedback("");
        }
        setLoading(false);
      }

      async function startGame() {
        if (!gs || gs.players.length < 2) { setError("Mind. 2 Spieler"); return; }
        await push(initGameState(gs.players, gs.gameMode));
      }

      // ── GAME ACTIONS ───────────────────────────────────────────────────────
      const me = gs && gs.players ? gs.players[myIndex] : null;

      // Plan a build this round (costs resources immediately, shown as "pending"). Bis zu 3 Gebäude pro Runde — jedes weitere kostet mehr.
      async function doBuild(bid) {
        if (!me || me.ready) return;
        const pending = me.pendingBuilds || [];
        const maxBuilds = (me.activeTechs||[]).includes("bauboom") ? MAX_BUILDS_PER_ROUND+1 : MAX_BUILDS_PER_ROUND;
        if (pending.length >= maxBuilds) return;
        const b = BUILDINGS.find(x => x.id === bid);
        const alreadyPlannedForThis = pending.filter(pb => pb.bid === bid).length;
        const cur = (me.buildings[bid] || 0) + alreadyPlannedForThis;
        if (!b || cur >= 3) return;
        if (!meetsReqs(me, bid)) return;
        const bd = b.levels[cur]; // next level
        const mult = BUILD_MULTI_MULT[pending.length] || BUILD_MULTI_MULT[BUILD_MULTI_MULT.length-1];
        const scaledCost = scaleCost(bd.cost, mult * getMode(gs).costMulti);
        if (!canAfford(me.resources, scaledCost)) return;
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {
          ...me,
          resources: deduct(me.resources, scaledCost),
          pendingBuilds: [...pending, {bid, level: cur+1, cost: scaledCost}],
        };
        let g = {...gs, players: newPlayers};
        setPanel(null);
        await push(g);
      }

      async function cancelBuild(idx) {
        if (!me || me.ready) return;
        const pending = me.pendingBuilds || [];
        const pb = pending[idx];
        if (!pb) return;
        // Refund resources
        const refunded = {...me.resources};
        for (const [r,v] of Object.entries(pb.cost)) refunded[r] = (refunded[r]||0) + v;
        const newPending = pending.filter((_,i)=>i!==idx);
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {...me, resources: refunded, pendingBuilds: newPending};
        await push({...gs, players: newPlayers});
      }

      async function doBankTrade(trade) {
        if (!me || me.ready || !trade) return;
        if ((me.resources[trade.give]||0) < trade.amt) return;
        const newPlayers = [...gs.players];
        const newRes = {...me.resources};
        newRes[trade.give] = (newRes[trade.give]||0) - trade.amt;
        newRes[trade.get] = (newRes[trade.get]||0) + 1;
        newPlayers[myIndex] = {...me, resources: newRes};
        let g = addLog({...gs, players:newPlayers},
          me.name+" → Bank: "+trade.amt+RES_ICONS[trade.give]+" → +1"+RES_ICONS[trade.get]);
        setPanel(null);
        await push(g);
      }

      // Send trade offer
      async function sendTradeOffer() {
        if (!me || ptTarget === null) return;
        if (!canAfford(me.resources, ptOffer)) { setError("Nicht genug Ressourcen"); return; }
        if (Object.values(ptOffer).every(v=>v===0) && Object.values(ptWant).every(v=>v===0)) return;
        const os = Object.entries(ptOffer).filter(([,v])=>v>0).map(([r,v])=>v+(RES_ICONS[r]||r)).join(" ")||"nichts";
        const ws = Object.entries(ptWant).filter(([,v])=>v>0).map(([r,v])=>v+(RES_ICONS[r]||r)).join(" ")||"nichts";
        // Solo: KI antwortet sofort mit strategischer Bewertung
        if (isSolo && ptTarget !== myIndex) {
          const aiP = gs.players[ptTarget];
          const attempts = (gs.soloTradeAttempts||{})[myIndex] || 0;
          const newAttempts = {...(gs.soloTradeAttempts||{}), [myIndex]: attempts + 1};
          let g;
          if (attempts >= 2) {
            g = addLog({...gs, soloTradeAttempts: newAttempts}, "😤 "+aiP.name+" ignoriert weitere Angebote diese Runde");
          } else if (!canAfford(aiP.resources, ptWant)) {
            g = addLog({...gs, soloTradeAttempts: newAttempts}, "❌ "+aiP.name+" kann sich das nicht leisten");
          } else {
            // KI bewertet nach eigenem Bedarf: knappe Ressourcen sind wertvoller
            const aiNeeds = {};
            for (const r of RESOURCES) aiNeeds[r] = 1 / ((aiP.resources[r]||0) + 1);
            const valueGets = Object.entries(ptOffer).reduce((s,[r,v])=>s+v*(aiNeeds[r]||0),0);
            const valueGives = Object.entries(ptWant).reduce((s,[r,v])=>s+v*(aiNeeds[r]||0),0);
            const newPlayers = [...gs.players];
            if (valueGets > valueGives) {
              let myRes = {...me.resources};
              for (const [r,v] of Object.entries(ptWant)) myRes[r] = (myRes[r]||0)+v;
              let aiRes = deduct({...aiP.resources}, ptWant);
              for (const [r,v] of Object.entries(ptOffer)) aiRes[r] = (aiRes[r]||0)+v;
              newPlayers[myIndex] = {...me, resources: myRes};
              newPlayers[ptTarget] = {...aiP, resources: aiRes};
              g = addLog({...gs, players:newPlayers, soloTradeAttempts: newAttempts}, "✅ "+aiP.name+" nimmt Handel an: "+os+" ↔ "+ws);
            } else {
              g = addLog({...gs, soloTradeAttempts: newAttempts}, "❌ "+aiP.name+" lehnt ab — kein gutes Angebot");
            }
          }
          setPanel(null); resetTrade();
          await push(g);
          return;
        }
        const offer = {
          id: Date.now(),
          from: myIndex, fromName: me.name, fromColor: me.color,
          to: ptTarget, toName: gs.players[ptTarget].name,
          offer: {...ptOffer}, want: {...ptWant},
        };
        // Reserve the offered resources
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {...me, resources: deduct(me.resources, ptOffer)};
        let g = addLog({...gs, players:newPlayers, tradeOffers:[...(gs.tradeOffers||[]), offer]},
          me.name+" bietet Handel an "+gs.players[ptTarget].name+"…");
        setPanel(null); resetTrade();
        await push(g);
      }

      async function acceptTrade(offer) {
        const them = gs.players[offer.from];
        const myP  = gs.players[myIndex];
        if (!canAfford(myP.resources, offer.want)) { setError("Nicht genug zum Annehmen"); return; }
        const newPlayers = [...gs.players];
        // Give me what I wanted, take what I give
        let myRes = deduct({...myP.resources}, offer.want);
        for (const [r,v] of Object.entries(offer.offer)) myRes[r] = (myRes[r]||0)+v;
        newPlayers[myIndex] = {...myP, resources: myRes};
        // Give them back what they offered + what they wanted
        let thRes = {...them.resources};
        for (const [r,v] of Object.entries(offer.want)) thRes[r] = (thRes[r]||0)+v;
        newPlayers[offer.from] = {...them, resources: thRes};
        // Remove this offer
        const newOffers = (gs.tradeOffers||[]).filter(o=>o.id!==offer.id);
        const os = Object.entries(offer.offer).filter(([,v])=>v>0).map(([r,v])=>v+RES_ICONS[r]).join(" ")||"nichts";
        const ws = Object.entries(offer.want).filter(([,v])=>v>0).map(([r,v])=>v+RES_ICONS[r]).join(" ")||"nichts";
        let g = addLog({...gs, players:newPlayers, tradeOffers:newOffers},
          "✅ "+them.name+" gibt "+os+", "+myP.name+" gibt "+ws);
        await push(g);
      }

      async function declineTrade(offer) {
        // Refund offered resources to sender
        const them = gs.players[offer.from];
        const newPlayers = [...gs.players];
        let thRes = {...them.resources};
        for (const [r,v] of Object.entries(offer.offer)) thRes[r] = (thRes[r]||0)+v;
        newPlayers[offer.from] = {...them, resources: thRes};
        const newOffers = (gs.tradeOffers||[]).filter(o=>o.id!==offer.id);
        let g = addLog({...gs, players:newPlayers, tradeOffers:newOffers},
          "❌ "+gs.players[myIndex].name+" lehnt Angebot von "+offer.fromName+" ab");
        await push(g);
      }

      async function cancelOwnOffer(offer) {
        // Refund my resources
        const newPlayers = [...gs.players];
        let myRes = {...me.resources};
        for (const [r,v] of Object.entries(offer.offer)) myRes[r] = (myRes[r]||0)+v;
        newPlayers[myIndex] = {...me, resources: myRes};
        const newOffers = (gs.tradeOffers||[]).filter(o=>o.id!==offer.id);
        let g = addLog({...gs, players:newPlayers, tradeOffers:newOffers}, me.name+" zieht Angebot zurück");
        await push(g);
      }

      // Plan a raid this round
      async function doRaid(targetIdx, level) {
        if (!me || me.ready || me.pendingRaeuber) return;
        const rd = RAEUBER_LEVELS[level-1];
        if (!canAfford(me.resources, rd.cost)) return;
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {
          ...me,
          resources: deduct(me.resources, rd.cost),
          pendingRaeuber: {target: targetIdx, level},
        };
        let g = addLog({...gs, players: newPlayers},
          me.name+" plant Überfall auf "+gs.players[targetIdx].name+" (Stufe "+level+")");
        setPanel(null);
        await push(g);
      }

      async function cancelRaid() {
        if (!me || me.ready || !me.pendingRaeuber) return;
        const rd = RAEUBER_LEVELS[me.pendingRaeuber.level-1];
        const refunded = {...me.resources};
        for (const [r,v] of Object.entries(rd.cost)) refunded[r] = (refunded[r]||0)+v;
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {...me, resources: refunded, pendingRaeuber: null};
        await push({...gs, players: newPlayers});
      }

      async function doTech(tc) {
        if (!me || me.ready) return;
        if (!canAfford(me.resources, tc.cost)) return;
        let newRes = deduct(me.resources, tc.cost);
        const techs = [...(me.activeTechs||[]), tc.id];
        // Sofort-Effekte
        if (tc.id === "ernte2") newRes = {...newRes, Getreide: (newRes.Getreide||0)+5};
        if (tc.id === "schatz") newRes = {...newRes, Gold: (newRes.Gold||0)+4};
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {...me, resources: newRes, activeTechs: techs};
        const newStats = {...(gs.stats||{}), techsBought: {...(gs.stats?.techsBought||{}), [myIndex]: ((gs.stats?.techsBought||{})[myIndex]||0)+1}};
        let g = addLog({...gs, players: newPlayers, stats: newStats}, me.name+" kauft Technologie: "+tc.label);
        setPanel(null);
        await push(g);
      }

      async function proposeAlliance(targetIdx) {
        if (!me || me.ready) return;
        const already = (gs.allianceOffers||[]).find(o=>o.from===myIndex&&o.to===targetIdx);
        const alreadyAllied = (gs.alliances||[]).find(a=>(a.a===myIndex&&a.b===targetIdx)||(a.a===targetIdx&&a.b===myIndex));
        if (already || alreadyAllied) return;
        // Solo: KI antwortet sofort
        if (isSolo && targetIdx !== myIndex) {
          const aiP = gs.players[targetIdx];
          const accepts = Math.random() < 0.5;
          let g;
          if (accepts) {
            const newAlliances = [...(gs.alliances||[]), {a:myIndex, b:targetIdx, endsAfter: gs.round+3}];
            g = addLog({...gs, alliances:newAlliances}, "🤝 "+me.name+" & "+aiP.name+" sind Verbündete! (3 Runden)");
          } else {
            g = addLog({...gs}, "❌ "+aiP.name+" lehnt Allianz ab");
          }
          await push(g);
          return;
        }
        const newOffers = [...(gs.allianceOffers||[]), {from:myIndex, to:targetIdx}];
        let g = addLog({...gs, allianceOffers:newOffers}, "🤝 "+me.name+" bietet "+gs.players[targetIdx].name+" eine Allianz an");
        await push(g);
      }

      async function acceptAlliance(offer) {
        const newOffers = (gs.allianceOffers||[]).filter(o=>!(o.from===offer.from&&o.to===offer.to));
        const newAlliances = [...(gs.alliances||[]), {a:offer.from, b:offer.to, endsAfter: gs.round+3}];
        let g = addLog({...gs, allianceOffers:newOffers, alliances:newAlliances},
          "🤝 "+gs.players[offer.from].name+" & "+gs.players[offer.to].name+" sind Verbündete! (3 Runden)");
        await push(g);
      }

      async function declineAlliance(offer) {
        const newOffers = (gs.allianceOffers||[]).filter(o=>!(o.from===offer.from&&o.to===offer.to));
        let g = addLog({...gs, allianceOffers:newOffers}, gs.players[myIndex].name+" lehnt Allianz ab");
        await push(g);
      }

      async function doSabotage(targetIdx, bid) {
        if (!me || me.ready) return;
        const lvl = gs.players[targetIdx]?.buildings[bid] || 0;
        if (lvl === 0) return;
        const cost = { Gold: SABOTAGE_COST[lvl] };
        if (!canAfford(me.resources, cost)) return;
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {...me, resources: deduct(me.resources, cost), pendingSabotage: {target: targetIdx, bid}};
        const bName = BUILDINGS.find(b=>b.id===bid)?.name || bid;
        let g = addLog({...gs, players: newPlayers}, me.name+" plant Sabotage: "+gs.players[targetIdx].name+"s "+bName);
        setPanel(null);
        await push(g);
      }

      async function cancelSabotage() {
        if (!me || me.ready || !me.pendingSabotage) return;
        const lvl = gs.players[me.pendingSabotage.target]?.buildings[me.pendingSabotage.bid] || 1;
        const refunded = {...me.resources, Gold: (me.resources.Gold||0) + SABOTAGE_COST[lvl]};
        const newPlayers = [...gs.players];
        newPlayers[myIndex] = {...me, resources: refunded, pendingSabotage: null};
        await push({...gs, players: newPlayers});
      }

      async function breakAlliance(targetIdx) {
        const newAlliances = (gs.alliances||[]).filter(a=>!((a.a===myIndex&&a.b===targetIdx)||(a.a===targetIdx&&a.b===myIndex)));
        let g = addLog({...gs, alliances:newAlliances}, "💔 "+me.name+" bricht Allianz mit "+gs.players[targetIdx].name+"!");
        await push(g);
      }

      function isAllied(i, j) {
        return !!(gs&&(gs.alliances||[]).find(a=>((a.a===i&&a.b===j)||(a.a===j&&a.b===i))&&a.endsAfter>gs.round));
      }

      async function deleteRoom() {
        if (!isHost || !gs) return;
        if (!window.confirm("Lobby wirklich löschen? Alle Spieler werden entfernt.")) return;
        // Delete from supabase
        const h = {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        };
        await fetch(SUPABASE_URL+"/rest/v1/game_rooms?id=eq."+codeRef.current, {method:"DELETE", headers:h});
        clearSession();
        setScreen("home"); setGs(null); setMyIndex(null); setIsHost(false); setRoomCode(""); setJoinCode("");
      }

      async function setGameMode(mode) {
        if (!isHost || !gs || gs.gameMode === mode) return;
        await push({...gs, gameMode: mode});
      }

      async function leaveRoom() {
        if (myIndex === null || !gs) return;
        if (isHost) {
          // Host leaving — delete the room (deleteRoom asks for confirmation)
          await deleteRoom();
          return;
        }
        if (!window.confirm("Wirklich den Raum verlassen?")) return;
        // Non-host: remove self from players
        const newPlayers = gs.players.filter((_, i) => i !== myIndex);
        const recolored = newPlayers.map((p, i) => ({...p, color: PLAYER_COLORS[i]}));
        await sb.current.updateRoom(codeRef.current, {...gs, players: recolored});
        clearSession();
        setScreen("home"); setGs(null); setMyIndex(null); setIsHost(false); setRoomCode(""); setJoinCode("");
      }

      async function kickPlayer(idx) {
        if (!isHost || !gs || idx === myIndex) return;
        const newPlayers = gs.players.filter((_, i) => i !== idx);
        // Reassign colors
        const recolored = newPlayers.map((p, i) => ({...p, color: PLAYER_COLORS[i]}));
        let g = addLog({...gs, players: recolored, tradeOffers: (gs.tradeOffers||[]).filter(o => o.from !== idx && o.to !== idx)},
          gs.players[idx].name + " wurde gekickt");
        await push(g);
      }

      async function restartGame() {
        setMenuOpen(false);
        if (!gs) return;
        await push(initGameState(gs.players, gs.gameMode));
      }

      async function returnToLobby() {
        setMenuOpen(false);
        if (!gs) return;
        const lobby = {
          phase: "lobby",
          players: gs.players.map(p => ({name: p.name, color: p.color})),
          log: [], chat: gs.chat || [], tradeOffers: [], winner: null,
        };
        await push(lobby);
        setScreen("lobby");
      }

      // Mark/unmark ready
      async function markReady() {
        if (!me) return;
        if (me.ready) {
          // Unmark ready
          const newPlayers = [...gs.players];
          newPlayers[myIndex] = {...me, ready: false};
          await push({...gs, players: newPlayers});
          return;
        }
        // Fetch latest state to avoid race conditions (skip in solo)
        const fresh = isSolo ? null : await sb.current.getRoom(codeRef.current);
        const freshGs = (!isSolo && fresh) ? fresh.state : gs;
        const freshMe = freshGs.players[myIndex];
        if (!freshMe || freshMe.ready) return;
        const newPlayers = [...freshGs.players];
        newPlayers[myIndex] = {...freshMe, ready: true};

        // Solo: alle KI-Spieler ziehen sofort
        if (isSolo) {
          for (let i = 0; i < freshGs.players.length; i++) {
            if (i !== myIndex) newPlayers[i] = runAI(freshGs, i);
          }
        }

        let g = {...freshGs, players: newPlayers};
        g = addLog(g, freshMe.name+" ist bereit ✓");

        // Check if all ready
        const allReady = newPlayers.every(p => p.ready);
        let summaryData = null;
        if (allReady) {
          const raidLogs = [];
          const gMode = freshGs.gameMode;

          // Expire old alliances
          const activeAlliances = (freshGs.alliances||[]).filter(a => a.endsAfter > freshGs.round);

          // Track builds per player
          const oldStats = freshGs.stats || {buildsTotal:{},raidsReceived:{},roundsLed:{},techsBought:{}};
          let newStats = { buildsTotal:{...oldStats.buildsTotal}, raidsReceived:{...oldStats.raidsReceived}, roundsLed:{...oldStats.roundsLed}, techsBought:{...oldStats.techsBought} };
          newPlayers.forEach((p,i) => { if ((p.pendingBuilds||[]).length > 0) newStats.buildsTotal[i] = (newStats.buildsTotal[i]||0) + p.pendingBuilds.length; });

          // Resolve builds + income (+ tech effects)
          let resolved = newPlayers.map(p => {
            const techs = p.activeTechs || [];
            let np = {...p, ready: false, buildings: {...(p.buildings||{})}, activeTechs: []};
            for (const pb of (np.pendingBuilds||[])) np.buildings[pb.bid] = pb.level;
            np.pendingBuilds = [];
            np = applyIncome(np, gMode);
            if (techs.includes("doppel")) np = applyIncome(np, gMode); // 2× Einkommen
            return np;
          });

          const vpBefore = freshGs.players.map(p => ({name:p.name, color:p.color, vp:calcVP(p)}));

          // Random event (40% chance)
          let activeEvent = null;
          if (Math.random() < 0.4) {
            activeEvent = EVENTS[Math.floor(Math.random()*EVENTS.length)];
            resolved = activeEvent.apply(resolved);
            if (activeEvent.label) raidLogs.push("🎲 EREIGNIS: "+activeEvent.label+" — "+activeEvent.desc);
          }

          // Apply raids — blocked by alliance
          newPlayers.forEach((p, i) => {
            if (!p.pendingRaeuber) return;
            const {target, level} = p.pendingRaeuber;
            const allied = activeAlliances.find(a=>(a.a===i&&a.b===target)||(a.a===target&&a.b===i));
            if (allied) {
              raidLogs.push("🤝 "+p.name+" wollte "+resolved[target].name+" überfallen — aber Allianz schützt!");
              resolved[i] = {...resolved[i], pendingRaeuber: null};
              return;
            }
            const rd = RAEUBER_LEVELS[level-1];
            const victim = resolved[target];
            const available = RESOURCES.filter(r => (victim.resources[r]||0) > 0);
            if (available.length === 0) {
              raidLogs.push("🗡️ "+p.name+" überfällt "+victim.name+" — aber die Vorräte sind leer!");
              resolved[i] = {...resolved[i], pendingRaeuber: null};
              return;
            }
            let totalTaken = {};
            const takeCount = rd.steal * 2;
            for (let s = 0; s < takeCount; s++) {
              const still = RESOURCES.filter(r => (victim.resources[r]||0) - (totalTaken[r]||0) > 0);
              if (still.length === 0) break;
              const pick = still[Math.floor(Math.random()*still.length)];
              totalTaken[pick] = (totalTaken[pick]||0)+1;
            }
            let raiderGets = {}, lost = {};
            for (const [r,v] of Object.entries(totalTaken)) {
              const gets = Math.max(0, Math.floor(v * 0.6));
              if (gets > 0) raiderGets[r] = gets;
              if (v-gets > 0) lost[r] = v-gets;
            }
            let victimRes = {...victim.resources};
            let raiderRes = {...resolved[i].resources};
            for (const [r,v] of Object.entries(totalTaken)) victimRes[r] = Math.max(0, (victimRes[r]||0)-v);
            for (const [r,v] of Object.entries(raiderGets)) raiderRes[r] = (raiderRes[r]||0)+v;
            resolved[target] = {...victim, resources: victimRes};
            resolved[i] = {...resolved[i], resources: raiderRes, pendingRaeuber: null};
            const takenStr = Object.entries(totalTaken).map(([r,v])=>v+RES_ICONS[r]).join(" ");
            const getsStr = Object.entries(raiderGets).map(([r,v])=>v+RES_ICONS[r]).join(" ") || "nichts";
            raidLogs.push("🗡️ "+p.name+" überfällt "+resolved[target].name+"! Nimmt "+takenStr+", bekommt "+getsStr);
            newStats.raidsReceived[target] = (newStats.raidsReceived[target]||0)+1;
          });
          resolved = resolved.map(p => ({...p, pendingRaeuber: null}));

          // Apply sabotages
          newPlayers.forEach((p, i) => {
            if (!p.pendingSabotage) return;
            const {target, bid} = p.pendingSabotage;
            const victim = resolved[target];
            const curLvl = victim.buildings[bid] || 0;
            const bName = BUILDINGS.find(b=>b.id===bid)?.name || bid;
            if (curLvl === 0) {
              raidLogs.push("💣 "+p.name+" sabotiert "+victim.name+"s "+bName+" — schon zerstört!");
            } else {
              const newBuildings = {...victim.buildings};
              if (curLvl === 1) delete newBuildings[bid];
              else newBuildings[bid] = curLvl - 1;
              resolved[target] = {...victim, buildings: newBuildings};
              raidLogs.push("💣 "+p.name+" sabotiert "+victim.name+"s "+bName+"! "+(curLvl===1?"🔥 Zerstört!":"⬇️ Lv"+curLvl+"→Lv"+(curLvl-1)));
              newStats.raidsReceived[target] = (newStats.raidsReceived[target]||0)+1;
            }
            resolved[i] = {...resolved[i], pendingSabotage: null};
          });
          resolved = resolved.map(p => ({...p, pendingSabotage: null}));

          // Finanzamt — pro Spieler eigene Chance, Burg schützt, Frieden-Event überspringt
          if (!activeEvent?.skipFinanzamt) {
            resolved.forEach((p, vi) => {
              if ((p.activeTechs||[]).includes("steuer")) {
                raidLogs.push("🛡️ "+p.name+" hat Steuerberater — Finanzamt zieht weiter!"); return;
              }
              const total = RESOURCES.reduce((s,r)=>(s+(p.resources[r]||0)),0);
              if (total < FINANZAMT_MIN_VERMOEGEN) return;
              const burgLvl = p.buildings?.burg || 0;
              const protection = burgLvl >= 3 ? 1.0 : burgLvl === 2 ? 0.65 : burgLvl === 1 ? 0.5 : 0;
              const chance = Math.min(0.75, (total - 14) * 0.03) * (1 - protection);
              if (Math.random() > chance) return;
              const newRes = {...p.resources};
              let lost = {};
              for (const r of RESOURCES) {
                if ((newRes[r]||0) <= 0) continue;
                const lose = Math.ceil((newRes[r]||0) * (0.35 + Math.random()*0.25));
                if (lose > 0) { lost[r] = lose; newRes[r] = Math.max(0, newRes[r]-lose); }
              }
              if (Object.keys(lost).length > 0) {
                const lostStr = Object.entries(lost).map(([r,v])=>v+RES_ICONS[r]).join(" ");
                const schutz = burgLvl > 0 ? " (Burg: "+Math.round(protection*100)+"% Schutz hatte nicht gereicht)" : "";
                raidLogs.push("🏛️ FINANZAMT prüft "+p.name+"! Verliert "+lostStr+schutz);
                newStats.raidsReceived[vi] = (newStats.raidsReceived[vi]||0)+1;
                resolved[vi] = {...p, resources: newRes};
              }
            });
          } else {
            raidLogs.push("🕊️ Frieden schützt vor dem Finanzamt diese Runde!");
          }

          // Check winner
          const winVP = getWinVP(freshGs);
          let winner = null;
          for (let i = 0; i < resolved.length; i++) {
            if (calcVP(resolved[i]) >= winVP) { winner = i; break; }
          }

          const vpAfter = resolved.map(p => ({name:p.name, color:p.color, vp:calcVP(p)}));
          // Track roundsLed for VP leader
          const leadIdx = vpAfter.reduce((best,p,i) => p.vp > vpAfter[best].vp ? i : best, 0);
          newStats.roundsLed[leadIdx] = (newStats.roundsLed[leadIdx]||0)+1;
          summaryData = { round: gs.round, event: activeEvent?.label ? activeEvent : null, vpBefore, vpAfter, raidLogs: [...raidLogs] };

          const newRound = gs.round + 1;
          const incLogs = resolved.map(p => p.name+": "+incSummary(p, gMode)).join(" | ");
          g = {...g, players: resolved, round: newRound, phase: winner!==null?"finished":"playing", winner, alliances: activeAlliances, allianceOffers: freshGs.allianceOffers||[], stats: newStats, soloTradeAttempts: {}};
          g = addLog(g, "🔔 Runde "+gs.round+" abgeschlossen! Einnahmen: "+incLogs);
          for (const rl of raidLogs) g = addLog(g, rl);
          if (winner !== null) g = addLog(g, "🏆 "+resolved[winner].name+" gewinnt mit "+calcVP(resolved[winner])+" VP (Ziel: "+winVP+")!");
        }

        await push(g);
        if (summaryData) setRoundSummary(summaryData);
      }

      // Chat
      async function sendChat() {
        if (!chatMsg.trim() || !gs || !me) return;
        const msg = {name:me.name, text:chatMsg.trim(), color:me.color, t:Date.now(), from: myIndex,
          to: chatTarget, toName: chatTarget!==null ? gs.players[chatTarget]?.name : null};
        const newChat = [...(gs.chat||[]), msg].slice(-60);
        setChatMsg("");
        await push({...gs, chat:newChat});
      }

      // ── RENDER ──────────────────────────────────────────────────────────────
      const ipt = {background:"#1b1f2e",border:"1px solid #333",borderRadius:8,padding:"10px 12px",color:"#fff",fontSize:15,outline:"none",width:"100%",display:"block"};

      function ResCounter({res, val, setVal, max}) {
        return (
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <button onClick={()=>setVal(v=>Math.max(0,v-1))} style={{background:"#333",border:"none",borderRadius:4,color:"#fff",width:28,height:28,fontSize:16,cursor:"pointer"}}>−</button>
            <span style={{color:"#fff",fontWeight:700,minWidth:20,textAlign:"center"}}>{val}</span>
            <button onClick={()=>setVal(v=>Math.min(max,v+1))} style={{background:"#333",border:"none",borderRadius:4,color:"#fff",width:28,height:28,fontSize:16,cursor:"pointer"}}>+</button>
          </div>
        );
      }

      // HOME
      if (screen === "home") return (
        <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0d1117 0%,#111624 55%,#0d1117 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px 16px",position:"relative"}}>
          <StarField/>
          {/* Version badge */}
          <div className="version-badge">Alpha {VERSION}</div>
          <div style={{width:"100%",maxWidth:420,position:"relative",zIndex:1}}>

            {/* Hero */}
            <div style={{textAlign:"center",marginBottom:28}}>
              <h1 className="gradient-title hero-l1 home-title" style={{fontSize:46,fontWeight:900,marginBottom:10,letterSpacing:1,lineHeight:1.1}}>Handelswege</h1>
              <p className="hero-l2 home-sub1" style={{color:"#c8d0e8",fontSize:15,fontWeight:500,marginBottom:6,lineHeight:1.5}}>
                Handle mit Ressourcen, schließe Bündnisse und errichte dein Handelsimperium.
              </p>
              <p className="hero-l3" style={{color:"#3a4060",fontSize:12,letterSpacing:1.5,textTransform:"uppercase"}}>
                Tritt gegen Freunde oder die KI an und dominiere die Handelswege.
              </p>
            </div>

            {/* Name */}
            <div className="home-card home-sect" style={{background:"#1e2233",border:"1px solid #2a2e42",borderRadius:14,padding:"14px 16px",marginBottom:10}}>
              <div style={{color:"#4a5070",fontSize:10,letterSpacing:1.5,marginBottom:8,textTransform:"uppercase",fontWeight:600}}>Dein Name</div>
              <input className="home-input" style={{...ipt,background:"#13172200",border:"1px solid #2e3450",transition:"border-color 0.2s,box-shadow 0.2s"}}
                value={myName} onChange={e=>{setMyName(e.target.value);setError("");setFeedback("");}}
                placeholder="Name eingeben…" maxLength={16}/>
            </div>

            {/* Primary CTA */}
            <button onClick={createRoom} disabled={loading} className="cta-orange home-sect"
              style={{width:"100%",background:"linear-gradient(135deg,#f4a261,#e76f51)",border:"none",borderRadius:12,color:"#1b1f2e",padding:"16px 0",fontSize:16,fontWeight:900,cursor:"pointer",marginBottom:10,letterSpacing:0.3}}>
              🏠 Neuen Raum erstellen
            </button>

            {/* Solo vs KI */}
            <div className="home-card home-sect" style={{background:"#1e2233",border:"1px solid #2a2e42",borderRadius:14,padding:"14px 16px",marginBottom:10}}>
              <div style={{color:"#4a5070",fontSize:10,letterSpacing:1.5,marginBottom:10,textTransform:"uppercase",fontWeight:600}}>Solo vs KI</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:10}}>
                {Object.entries(MODES).map(([id,m])=>{
                  const active = soloMode===id;
                  return (
                    <button key={id} onClick={()=>setSoloMode(id)} className="mode-btn"
                      style={{background:active?"rgba(155,89,182,0.15)":"#13172280",border:"2px solid "+(active?"#9b59b6":"#2a2e42"),borderRadius:10,padding:"10px 4px 8px",cursor:"pointer",textAlign:"center"}}>
                      <div style={{fontSize:16,marginBottom:3}}>{m.label.split(" ")[0]}</div>
                      <div style={{color:"#fff",fontWeight:700,fontSize:11,marginBottom:2}}>{m.label.split(" ").slice(1).join(" ")}</div>
                      <div style={{color:active?"#b370d4":"#3a4060",fontSize:10,fontWeight:600}}>{m.winVP} VP</div>
                    </button>
                  );
                })}
              </div>
              <div style={{background:"#13172280",borderRadius:8,padding:"6px 10px",marginBottom:10,color:"#6a7090",fontSize:11}}>
                {MODES[soloMode]?.desc}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                <div style={{color:"#4a5070",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>KI-Gegner:</div>
                {[1,2,3].map(n=>(
                  <button key={n} onClick={()=>setNumAI(n)} className="mode-btn"
                    style={{flex:1,background:numAI===n?"rgba(155,89,182,0.2)":"#13172280",border:"1px solid "+(numAI===n?"#9b59b6":"#2a2e42"),borderRadius:8,color:numAI===n?"#c39bd3":"#4a5070",padding:"6px 0",fontSize:12,cursor:"pointer",fontWeight:700}}>
                    {n} 🤖
